<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizFlow Pro — Kahoot Quiz</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --track: #334155;
      --text: #f8fafc; --accent: #8b5cf6; --success: #22c55e; --danger: #ef4444;
      --gold: #f59e0b; --font: system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 20px; display: flex; align-items: center; justify-content: center;
    }
    .container { max-width: 900px; width: 100%; }
    #login { text-align: center; padding: 40px 20px; }
    #login h1 { font-size: 28px; margin-bottom: 8px; color: var(--accent); }
    #login .subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
    #login input {
      padding: 14px; border: 2px solid var(--accent); background: var(--panel);
      color: var(--text); border-radius: 10px; font-size: 16px; width: 280px;
      display: block; margin: 8px auto; outline: none; font-family: var(--font);
    }
    #login input:focus { border-color: #a78bfa; }
    #joinBtn {
      padding: 14px 36px; background: var(--accent); color: white; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px;
      transition: transform 0.15s, background 0.15s; font-family: var(--font); display: inline-block;
    }
    #joinBtn:hover { background: #7c3aed; transform: translateY(-2px); }
    #joinBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .hint { font-size: 12px; color: #64748b; margin-top: 10px; }
    .error-msg { color: var(--danger); margin-top: 12px; font-size: 14px; min-height: 18px; }
    #fatal-error { display:none; text-align:center; padding:40px 20px; }
    #fatal-error h2 { color:var(--danger); font-size:22px; margin-bottom:12px; }
    #fatal-error p { color:#94a3b8; font-size:14px; line-height:1.6; }
    #game { display: none; }
    .game-status { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 12px; }
    .timer-text { font-size: 32px; font-weight: 800; color: var(--gold); text-align: center; margin-bottom: 8px; }
    .timer-bar { width: 100%; height: 8px; background: var(--track); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
    .timer-fill { height: 100%; background: var(--success); width: 100%; transition: background 0.5s; }
    .leaderboard { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--track); margin-bottom: 20px; }
    .lb-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .lb-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
    .lb-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--track); border-radius:10px; }
    .lb-row:nth-child(1) { background:linear-gradient(90deg,rgba(245,158,11,.25),transparent); border:1px solid var(--gold); }
    .lb-row:nth-child(2) { background:linear-gradient(90deg,rgba(156,163,175,.25),transparent); }
    .lb-row:nth-child(3) { background:linear-gradient(90deg,rgba(234,179,8,.2),transparent); }
    .lb-rank { font-weight:700; width:28px; text-align:center; }
    .lb-name { flex:1; font-size:14px; margin-left:10px; }
    .lb-score { font-weight:700; color:var(--success); font-size:13px; }
    .lb-streak { color:var(--gold); font-size:12px; }
    .question-card { background:var(--panel); border-radius:12px; padding:24px; border:1px solid var(--track); margin-bottom:20px; }
    .question-text { font-size:20px; font-weight:600; margin-bottom:20px; line-height:1.4; text-align:center; }
    .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .opt-btn {
      padding:16px; background:var(--track); color:var(--text); border:2px solid transparent;
      border-radius:10px; cursor:pointer; font-size:15px; text-align:left;
      transition:border-color .15s,background .15s; font-family:var(--font);
    }
    .opt-btn:hover:not(:disabled) { border-color:var(--accent); }
    .opt-btn:disabled { opacity:.6; cursor:not-allowed; }
    .opt-btn.correct { background:var(--success); border-color:#16a34a; }
    .opt-btn.wrong   { background:var(--danger);  border-color:#dc2626; }
    .short-input { width:100%; padding:14px; background:var(--track); border:2px solid var(--track); border-radius:10px; color:var(--text); font-size:16px; margin-bottom:12px; font-family:var(--font); outline:none; }
    .short-input:focus { border-color:var(--accent); }
    .submit-btn { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; font-family:var(--font); }
    .submit-btn:hover:not(:disabled) { background:#7c3aed; }
    .submit-btn:disabled { opacity:.5; cursor:not-allowed; }
    .score-popup { position:fixed; top:38%; left:50%; transform:translateX(-50%); font-size:36px; font-weight:900; pointer-events:none; z-index:100; text-shadow:0 2px 12px rgba(0,0,0,.6); animation:popUp 1.1s ease forwards; }
    @keyframes popUp { 0%{opacity:0;transform:translateX(-50%) scale(.5)} 20%{opacity:1;transform:translateX(-50%) scale(1.2)} 80%{opacity:1;transform:translateX(-50%) translateY(-16px) scale(1)} 100%{opacity:0;transform:translateX(-50%) translateY(-36px) scale(.9)} }
    @media(max-width:600px){ .options{grid-template-columns:1fr} #login input{width:100%;max-width:300px} }
  </style>
</head>
<body>
<div class="container">

  <div id="fatal-error">
    <h2>⚠️ Cannot Start</h2>
    <p id="fatal-msg">Please open this page using the link your teacher provided.</p>
  </div>

  <div id="login">
    <h1>🎯 Kahoot Quiz</h1>
    <p class="subtitle">Enter room code and your name to join</p>
    <input type="text" id="inp-code" placeholder="Room Code (e.g. KHABCDE1)"
           maxlength="8" autocomplete="off" spellcheck="false"
           style="text-transform:uppercase;letter-spacing:3px;font-family:monospace;">
    <input type="text" id="inp-name" placeholder="Your Name" maxlength="20" autocomplete="off">
    <br>
    <button id="joinBtn">Join Quiz 🎯</button>
    <p class="hint">Get the room code from your teacher's screen</p>
    <p id="joinError" class="error-msg"></p>
  </div>

  <div id="game">
    <div style="text-align:center;margin-bottom:20px;">
      <h2 id="gameTitle" style="font-size:22px;margin-bottom:4px;">Quiz in Progress</h2>
    </div>
    <div class="game-status" id="gameStatus">Answer fast for bonus points!</div>
    <div class="timer-text" id="timer">--</div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="leaderboard">
      <div class="lb-title">🏆 Live Leaderboard</div>
      <div class="lb-list" id="lbList"></div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="question-text" id="questionText">Loading...</div>
      <div id="answerArea"></div>
    </div>
  </div>

</div>

<!-- Firebase MUST load before our script -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
/* ──────────────────────────────────────────────────────────────
   Everything inside an IIFE so one error can't kill joinGame.
   Functions are NOT attached via onclick="" — they use
   addEventListener so they exist even if the HTML is parsed
   before the script runs.
────────────────────────────────────────────────────────────── */
(function () {
  'use strict';

  /* 1 ── URL params */
  var params     = new URLSearchParams(window.location.search);
  var GAS_URL    = (params.get('script') || '').trim();
  var presetRoom = (params.get('room')   || '').trim().toUpperCase();

  /* 2 ── Fatal-error helper */
  function fatal(msg) {
    document.getElementById('login').style.display      = 'none';
    document.getElementById('game').style.display       = 'none';
    document.getElementById('fatal-error').style.display = 'block';
    document.getElementById('fatal-msg').textContent    = msg;
    console.error('[Kahoot]', msg);
  }

  /* 3 ── Need GAS URL */
  if (!GAS_URL) {
    // Show error after DOM ready
    document.addEventListener('DOMContentLoaded', function () {
      fatal('Missing ?script= URL. Please open this page using the link your teacher shared.');
    });
    return;
  }

  /* 4 ── Firebase init (guarded) */
  var db;
  try {
    var cfg = {
      apiKey:            'AIzaSyCLfySFzCpbz3CBX1bjha5KxvA0MrJExIc',
      authDomain:        'kahoot-24063.firebaseapp.com',
      databaseURL:       'https://kahoot-24063-default-rtdb.firebaseio.com',
      projectId:         'kahoot-24063',
      storageBucket:     'kahoot-24063.firebasestorage.app',
      messagingSenderId: '962917873467',
      appId:             '1:962917873467:web:a6b526aee30cd15c92291e'
    };
    var app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(cfg);
    db = firebase.database(app);
  } catch (e) {
    document.addEventListener('DOMContentLoaded', function () {
      fatal('Firebase error: ' + e.message);
    });
    return;
  }

  /* 5 ── State */
  var sessionId = '', playerId = '', playerName = '', playerColor = '';
  var questions = [], currentQIndex = 0, streak = 0, totalQuestions = 0;
  var timePerQ = 20, timerEnd = 0, clockOffset = 0;
  var rafId = null, gameUnsub = null, answered = false;

  /* 6 ── DOM wiring (runs once DOM is ready) */
  document.addEventListener('DOMContentLoaded', function () {

    /* Pre-fill room code from URL ?room= */
    if (presetRoom) document.getElementById('inp-code').value = presetRoom;

    /* Enter-key shortcuts */
    document.getElementById('inp-code').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('inp-name').focus();
    });
    document.getElementById('inp-name').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') joinGame();
    });

    /* ← THIS is why "joinGame is not defined" happened:
       the old file used onclick="joinGame()" in HTML, which
       executes before the IIFE script tag runs.
       Using addEventListener here guarantees the function exists. */
    document.getElementById('joinBtn').addEventListener('click', joinGame);
  });

  /* 7 ── Join */
  function joinGame() {
    var codeEl  = document.getElementById('inp-code');
    var nameEl  = document.getElementById('inp-name');
    var errorEl = document.getElementById('joinError');
    var btn     = document.getElementById('joinBtn');

    sessionId  = (codeEl.value || '').trim().toUpperCase();
    playerName = (nameEl.value || '').trim();
    errorEl.textContent = '';

    if (sessionId.length < 6) { errorEl.textContent = 'Enter a valid room code (6–8 characters)'; return; }
    if (playerName.length < 2) { errorEl.textContent = 'Enter your name (at least 2 characters)'; return; }

    btn.disabled = true; btn.textContent = 'Joining...';
    playerId    = 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    playerColor = '#' + (Math.floor(Math.random() * 0x999999) + 0x444444).toString(16).slice(-6);

    gasPost({ action: 'getKahootSession', sessionId: sessionId }, function (err, res) {
      if (err || !res || res.status !== 'success') {
        errorEl.textContent = (res && res.message) || 'Room not found. Check your code.';
        btn.disabled = false; btn.textContent = 'Join Quiz 🎯';
        return;
      }
      questions      = res.data.questions  || [];
      totalQuestions = res.data.totalQ     || questions.length;
      timePerQ       = res.data.timePerQ   || 20;

      document.getElementById('login').style.display = 'none';
      document.getElementById('game').style.display  = 'block';
      document.getElementById('gameTitle').textContent = 'Quiz: ' + sessionId;

      registerPlayer();
      initSync();
      setTimeout(loadQuestion, 600);
    });
  }

  /* 8 ── Firebase */
  function registerPlayer() {
    db.ref('kahoot/' + sessionId + '/players/' + playerId).set({
      name: playerName, color: playerColor,
      score: 0, streak: 0, progress: 0, finished: false,
      joinedAt: firebase.database.ServerValue.TIMESTAMP,
      updatedAt: firebase.database.ServerValue.TIMESTAMP
    });
  }
  function initSync() {
    db.ref('.info/serverTimeOffset').on('value', function (s) { clockOffset = s.val() || 0; });
    gameUnsub = db.ref('kahoot/' + sessionId + '/players').on('value', function (s) {
      renderLeaderboard(s.val() || {});
    });
  }

  /* 9 ── Question */
  function loadQuestion() {
    answered = false; stopTimer();
    var card = document.getElementById('questionCard');
    var qTxt = document.getElementById('questionText');
    var area = document.getElementById('answerArea');
    document.getElementById('gameStatus').textContent = 'Answer fast for bonus points!';

    if (currentQIndex >= totalQuestions) {
      card.innerHTML = '<div style="text-align:center"><h3 style="color:var(--success)">✅ Quiz Complete!</h3><p style="color:#94a3b8;margin-top:8px">Check the leaderboard for final results.</p></div>';
      document.getElementById('timer').textContent = '🏁';
      document.getElementById('timer-fill').style.width = '0';
      return;
    }

    var q = questions[currentQIndex];
    qTxt.textContent = 'Q' + (currentQIndex + 1) + '/' + totalQuestions + ': ' + q.question;
    area.innerHTML   = '';

    if (q.type === 'MCQ' || q.type === 'TF') {
      area.className = 'options';
      (q.options || []).forEach(function (opt) {
        var b = document.createElement('button');
        b.className   = 'opt-btn';
        b.textContent = opt;
        b.addEventListener('click', (function (o, el) {
          return function () { if (!answered) submitAnswer(o, el); };
        })(opt, b));
        area.appendChild(b);
      });
    } else {
      area.className = '';
      var inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'short-input';
      inp.placeholder = 'Type your answer...'; inp.maxLength = 120;
      var sb  = document.createElement('button');
      sb.className = 'submit-btn'; sb.textContent = 'Submit Answer';
      sb.addEventListener('click', function () { if (!answered && inp.value.trim()) submitAnswer(inp.value.trim(), null); });
      inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') sb.click(); });
      area.appendChild(inp); area.appendChild(sb);
      setTimeout(function () { inp.focus(); }, 80);
    }
    startTimer();
  }

  /* 10 ── Timer */
  function startTimer() {
    stopTimer();
    timerEnd = Date.now() + timePerQ * 1000;
    tick();
  }
  function stopTimer() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
  function tick() {
    var rem   = Math.max(0, timerEnd - Date.now());
    var sec   = Math.ceil(rem / 1000);
    var ratio = rem / (timePerQ * 1000);
    document.getElementById('timer').textContent      = sec < 10 ? '0' + sec : '' + sec;
    document.getElementById('timer-fill').style.width = (ratio * 100) + '%';
    document.getElementById('timer-fill').style.background =
      ratio > 0.5 ? '#22c55e' : ratio > 0.25 ? '#f59e0b' : '#ef4444';
    if (rem <= 0) {
      if (!answered) { answered = true; disableInputs(); popup('⏰ Time\'s Up!', '#ef4444'); setTimeout(function () { currentQIndex++; loadQuestion(); }, 1800); }
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  /* 11 ── Submit */
  function submitAnswer(answer, btnEl) {
    answered = true; stopTimer(); disableInputs();
    document.getElementById('gameStatus').textContent = 'Checking...';
    var tr = Math.max(0, (timerEnd - Date.now()) / 1000);

    gasPost({ action: 'validateKahootAnswer', sessionId: sessionId, playerId: playerId,
              qIndex: currentQIndex, answer: answer, timeRemaining: tr, currentStreak: streak },
    function (err, res) {
      if (err || !res || res.status !== 'success') {
        popup('⚠️ Error', '#f59e0b');
        setTimeout(function () { currentQIndex++; loadQuestion(); }, 1500);
        return;
      }
      var d = res.data;
      if (btnEl) btnEl.classList.add(d.isCorrect ? 'correct' : 'wrong');
      if (d.isCorrect) {
        streak = d.newStreak;
        popup('+' + d.pointsEarned + (d.streakBonus > 0 ? '  🔥×' + d.newStreak : ''), '#22c55e');
      } else { streak = 0; popup('✗ Wrong', '#ef4444'); }
      db.ref('kahoot/' + sessionId + '/players/' + playerId).update({
        score: d.totalScore || 0, streak: d.newStreak || 0, progress: d.progress || 0,
        finished: (currentQIndex + 1) >= totalQuestions,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
      document.getElementById('gameStatus').textContent = d.isCorrect ? '✅ Correct!' : '❌ Wrong!';
      setTimeout(function () { currentQIndex++; loadQuestion(); }, 1500);
    });
  }

  /* 12 ── Helpers */
  function disableInputs() {
    var els = document.querySelectorAll('#answerArea button, #answerArea input');
    for (var i = 0; i < els.length; i++) els[i].disabled = true;
  }
  function popup(text, color) {
    var old = document.getElementById('_pop');
    if (old) old.parentNode.removeChild(old);
    var el = document.createElement('div');
    el.id = '_pop'; el.className = 'score-popup';
    el.style.color = color; el.textContent = text;
    document.body.appendChild(el);
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1200);
  }
  function renderLeaderboard(players) {
    var arr = [];
    for (var id in players) { if (players.hasOwnProperty(id)) arr.push(players[id]); }
    arr.sort(function (a, b) { return (b.score || 0) - (a.score || 0); });
    var medals = ['🥇','🥈','🥉'];
    document.getElementById('lbList').innerHTML = arr.length ? arr.slice(0, 10).map(function (p, i) {
      return '<div class="lb-row">' +
        '<div class="lb-rank">' + (medals[i] || (i + 1)) + '</div>' +
        '<div class="lb-name">' + esc(p.name) + (p.finished ? ' 🏁' : '') + '</div>' +
        '<div><div class="lb-score">' + (p.score || 0).toLocaleString() + ' pts</div>' +
        (p.streak > 2 ? '<div class="lb-streak">🔥 ' + p.streak + '</div>' : '') + '</div>' +
      '</div>';
    }).join('') : '<div style="text-align:center;color:#64748b;padding:10px;font-size:13px">No players yet</div>';
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function gasPost(body, cb) {
    fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){ cb(null,d); })
      .catch(function(e){ console.error('[gasPost]',e); cb(e,null); });
  }

  window.addEventListener('beforeunload', function () { if (gameUnsub) gameUnsub(); stopTimer(); });

}()); // end IIFE
</script>
</body>
</html>
