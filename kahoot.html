<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QuizFlow — Kahoot Quiz</title>
  <style>
    :root{--bg:#0f172a;--panel:#1e293b;--track:#334155;--txt:#f8fafc;--muted:#94a3b8;--f:system-ui,sans-serif;--k-red:#e21b3c;--k-blue:#1368ce;--k-yellow:#d89e00;--k-green:#26890c}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:var(--f);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .wrap{max-width:720px;width:100%}
    .screen{display:none}
    .screen.on{display:block}

    /* SOUND & TTS CONTROLS */
    .top-controls{position:fixed;top:10px;right:12px;z-index:200;display:flex;gap:6px}
    .ctrl-btn{background:rgba(30,41,59,.9);border:1px solid #334155;border-radius:8px;color:var(--muted);font-size:16px;padding:6px 10px;cursor:pointer;line-height:1;transition:color .15s}
    .ctrl-btn:hover{color:var(--txt)}
    .ctrl-btn.muted{color:#f87171}
    .ctrl-btn.speaking{color:#4ade80;animation:ttsA 1s ease-in-out infinite}
    @keyframes ttsA{0%,100%{opacity:1}50%{opacity:.4}}

    /* JOIN */
    #s-join{text-align:center;padding:48px 20px}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
    .brand-dot{width:14px;height:14px;border-radius:50%}
    .brand-dot:nth-child(1){background:var(--k-red)}
    .brand-dot:nth-child(2){background:var(--k-blue)}
    .brand-dot:nth-child(3){background:var(--k-yellow)}
    .brand-dot:nth-child(4){background:var(--k-green)}
    .brand h1{font-size:26px;font-weight:800;color:#fff}
    .join-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
    .join-card{background:var(--panel);border-radius:16px;padding:28px;max-width:360px;margin:0 auto;border:1px solid #2d3a52}
    .field-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;text-align:left}
    .inp{display:block;width:100%;padding:13px 14px;background:#0f172a;border:1.5px solid #2d3a52;border-radius:10px;color:var(--txt);font-size:16px;font-family:var(--f);outline:none;transition:border-color .15s;margin-bottom:14px;-webkit-appearance:none}
    .inp:focus{border-color:#4f78ff}
    .inp-code{text-transform:uppercase;letter-spacing:6px;font-family:monospace;font-size:18px;text-align:center}
    .join-btn{width:100%;padding:14px;background:#4f78ff;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;font-family:var(--f);cursor:pointer;transition:opacity .15s;margin-top:4px}
    .join-btn:disabled{opacity:.5;cursor:not-allowed}
    .join-err{color:#f87171;font-size:13px;margin-top:12px;min-height:18px;text-align:center}

    /* LOBBY */
    #s-lobby{text-align:center;padding:36px 20px}
    .lby-badge{display:inline-block;background:#4f78ff22;border:1px solid #4f78ff55;border-radius:20px;padding:4px 16px;font-size:12px;font-weight:600;color:#7fa4ff;margin-bottom:16px}
    .lby-code-lbl{font-size:13px;color:var(--muted);margin-bottom:8px}
    .lby-code{font-family:monospace;font-size:clamp(40px,10vw,64px);font-weight:800;letter-spacing:10px;color:#fff;margin-bottom:4px}
    .lby-player-count{font-size:52px;font-weight:900;color:#4ade80;font-family:monospace;margin-top:16px;line-height:1}
    .lby-count-lbl{font-size:13px;color:var(--muted);margin:4px 0 20px}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px;margin:0 auto 20px;min-height:40px}
    .chip{padding:6px 16px;background:var(--panel);border:1px solid var(--track);border-radius:20px;font-size:13px;font-weight:600;animation:pop .22s ease}
    @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
    .lby-wait{font-size:14px;color:var(--muted)}
    .pulse{animation:pulse 1.6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* COUNTDOWN */
    #s-countdown{text-align:center;padding:80px 20px}
    .cd-label{font-size:16px;color:var(--muted);font-weight:600;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}
    .cd-num{font-size:clamp(80px,22vw,130px);font-weight:900;font-family:monospace;line-height:1;color:#fff;animation:cdPop .5s cubic-bezier(.17,.67,.46,1.41)}
    @keyframes cdPop{from{transform:scale(2);opacity:0}to{transform:scale(1);opacity:1}}

    /* QUESTION */
    .q-top{background:linear-gradient(135deg,#1e2d4a,#1a253e);border-radius:14px 14px 0 0;padding:18px 18px 12px;text-align:center;border:1px solid #2d3a52;border-bottom:none}
    .q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .q-dots{display:flex;gap:4px}
    .q-dot{width:8px;height:8px;border-radius:50%;background:var(--track);transition:background .3s}
    .q-dot.done{background:#4ade80}
    .q-dot.active{background:#4f78ff}
    .timer-arc-wrap{display:flex;align-items:center;justify-content:center;gap:8px}
    .timer-svg{transform:rotate(-90deg)}
    .timer-bg{fill:none;stroke:#2d3a52;stroke-width:4}
    .timer-fg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .2s linear,stroke .5s}
    .timer-text{font-size:13px;font-weight:700;fill:#fff}
    .q-txt{font-size:clamp(16px,3.5vw,21px);font-weight:700;color:#fff;line-height:1.4;max-width:580px;margin:0 auto}
    /* TTS in question */
    .q-tts-btn{background:rgba(79,120,255,.15);border:1px solid rgba(79,120,255,.35);border-radius:8px;color:#7fa4ff;font-size:12px;padding:4px 10px;cursor:pointer;font-family:var(--f);display:inline-flex;align-items:center;gap:4px;margin-top:8px;transition:background .15s}
    .q-tts-btn:hover{background:rgba(79,120,255,.25)}
    .q-tts-btn.speaking{color:#4ade80;border-color:rgba(74,222,128,.4)}

    .q-body{background:var(--panel);border:1px solid #2d3a52;border-radius:0 0 14px 14px;padding:14px}

    /* OPTION GRID */
    .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .opt-btn{
      display:flex;align-items:center;gap:12px;
      padding:14px 14px;border:none;border-radius:10px;
      color:#fff;font-size:14px;font-weight:700;font-family:var(--f);
      cursor:pointer;text-align:left;min-height:60px;
      transition:filter .1s;touch-action:manipulation;user-select:none;-webkit-user-select:none;
      -webkit-appearance:none
    }
    /* INSTANT feedback on touch */
    .opt-btn:not(:disabled):active{filter:brightness(1.25);transform:scale(.97)}
    .opt-btn:disabled{cursor:not-allowed}
    .opt-btn.k-red{background:var(--k-red)}
    .opt-btn.k-blue{background:var(--k-blue)}
    .opt-btn.k-yellow{background:var(--k-yellow)}
    .opt-btn.k-green{background:var(--k-green)}
    .opt-btn.selected{outline:4px solid rgba(255,255,255,.7);outline-offset:-4px}
    .opt-btn.correct{filter:brightness(1.1);animation:bump .3s ease}
    .opt-btn.wrong{filter:brightness(.4) grayscale(.4)}
    @keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
    .opt-shape{width:28px;height:28px;flex-shrink:0;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:14px}
    .opt-txt{flex:1}
    /* Image options */
    .opt-btn.has-img{flex-direction:column;align-items:center;padding:8px;min-height:100px}
    .opt-img{width:100%;height:72px;object-fit:cover;border-radius:7px;margin-bottom:4px;pointer-events:none}

    .short-area{padding:4px 0}
    .short-inp{width:100%;padding:14px;background:#0f172a;border:2px solid #2d3a52;border-radius:10px;color:#fff;font-size:15px;font-family:var(--f);outline:none;margin-bottom:10px;-webkit-appearance:none}
    .short-inp:focus{border-color:#4f78ff}
    .sub-btn{width:100%;padding:14px;background:#4f78ff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--f);cursor:pointer}
    .sub-btn:hover:not(:disabled){background:#3a5fcc}
    .sub-btn:disabled{opacity:.5;cursor:not-allowed}
    .answered-msg{text-align:center;padding:24px;font-size:15px;font-weight:600;color:var(--muted)}
    .answered-msg .big{font-size:38px;display:block;margin-bottom:10px}

    /* REVEAL */
    #s-reveal{padding:10px 0}
    .reveal-top{text-align:center;margin-bottom:16px}
    .reveal-q{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:12px;max-width:580px;margin-left:auto;margin-right:auto}
    .reveal-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .reveal-opt{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:10px;font-size:14px;font-weight:600}
    .reveal-opt.correct{background:var(--k-green);color:#fff}
    .reveal-opt.wrong{background:var(--track);color:var(--muted);filter:brightness(.7)}
    .reveal-opt.has-img{flex-direction:column;align-items:center;padding:8px}
    .reveal-opt-img{width:100%;height:64px;object-fit:cover;border-radius:6px;margin-bottom:4px}
    .reveal-opt-shape{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .reveal-stat{text-align:center;padding:12px 0;margin-bottom:16px}
    .reveal-stat .rs-your{font-size:14px;color:var(--muted);margin-bottom:4px}
    .reveal-stat .rs-pts{font-size:34px;font-weight:900;font-family:monospace}
    .reveal-stat .rs-pts.correct{color:#4ade80}
    .reveal-stat .rs-pts.wrong{color:#f87171}
    .reveal-stat .rs-streak{font-size:13px;color:#f59e0b;margin-top:2px}

    /* LEADERBOARD */
    #s-leaderboard{text-align:center;padding:16px 0}
    .lb-hdr{font-size:20px;font-weight:800;margin-bottom:18px}
    .lb-list{max-width:480px;margin:0 auto 20px;display:flex;flex-direction:column;gap:8px}
    .lb-row{display:flex;align-items:center;padding:12px 16px;border-radius:10px;gap:10px;font-weight:600;animation:slideIn .3s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .lb-row:nth-child(1){background:linear-gradient(90deg,#b8860b44,transparent);border:1px solid #b8860b66}
    .lb-row:nth-child(2){background:linear-gradient(90deg,#64748b44,transparent);border:1px solid #64748b66}
    .lb-row:nth-child(3){background:linear-gradient(90deg,#92400e44,transparent);border:1px solid #92400e55}
    .lb-row:nth-child(n+4){background:var(--panel);border:1px solid #2d3a52}
    .lb-rank{width:28px;font-size:18px;text-align:center}
    .lb-name{flex:1;font-size:15px;text-align:left}
    .lb-score{font-family:monospace;font-size:16px;font-weight:700;color:#4ade80}
    .lb-streak{font-size:12px;color:#f59e0b;margin-left:4px}
    .lb-me{outline:2px solid #4f78ff;outline-offset:-2px;border-radius:10px}
    .lb-next-auto{font-size:12px;color:var(--muted);margin-top:8px}

    /* FINAL */
    #s-final{text-align:center;padding:48px 20px}
    .final-podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:24px auto;max-width:380px}
    .podium-slot{flex:1;text-align:center}
    .podium-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
    .podium-name{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .podium-score{font-size:13px;font-weight:700;color:#4ade80;font-family:monospace;margin-bottom:4px}
    .podium-bar{border-radius:6px 6px 0 0;width:100%}
    .p1 .podium-bar{height:90px;background:#b8860b}
    .p2 .podium-bar{height:60px;background:#64748b}
    .p3 .podium-bar{height:44px;background:#92400e}
    .p1 .podium-avatar{background:#b8860b44;color:#f59e0b;border:2px solid #b8860b}
    .p2 .podium-avatar{background:#64748b44;color:#94a3b8;border:2px solid #64748b}
    .p3 .podium-avatar{background:#92400e44;color:#d97706;border:2px solid #92400e}
    .final-rank-badge{font-size:14px;color:var(--muted);margin-bottom:6px}
    .final-score-big{font-size:50px;font-weight:900;font-family:monospace;color:#4ade80;line-height:1;margin-bottom:4px}
    .final-score-lbl{font-size:14px;color:var(--muted)}
    .play-again-btn{margin-top:28px;padding:14px 40px;background:#4f78ff;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--f);cursor:pointer}
    .play-again-btn:hover{background:#3a5fcc}

    .spin-icon{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spinR .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spinR{to{transform:rotate(360deg)}}

    @media(max-width:520px){
      .opts-grid,.reveal-opts{grid-template-columns:1fr}
      .opt-btn{min-height:52px}
    }
  </style>
</head>
<body>

<!-- CONTROLS -->
<div class="top-controls">
  <button class="ctrl-btn" id="ttsBtn" onclick="toggleTTS()" title="Read question aloud" style="display:none">🔊</button>
  <button class="ctrl-btn" id="soundBtn" onclick="toggleSound()" title="Toggle sound effects">🎵</button>
</div>

<div class="wrap">

  <!-- JOIN -->
  <div class="screen on" id="s-join">
    <div class="brand">
      <div class="brand-dot"></div><div class="brand-dot"></div>
      <h1>QuizFlow Live</h1>
      <div class="brand-dot"></div><div class="brand-dot"></div>
    </div>
    <p class="join-sub">Enter the room code your teacher shared</p>
    <div class="join-card">
      <div class="field-lbl">Room Code</div>
      <input class="inp inp-code" id="inp-code" type="text" placeholder="ABCD12" maxlength="8" autocomplete="off" spellcheck="false" inputmode="text">
      <div class="field-lbl">Your Name</div>
      <input class="inp" id="inp-name" type="text" placeholder="e.g. Adisa O." maxlength="20" autocomplete="off">
      <button class="join-btn" id="joinBtn">Join Quiz</button>
      <div class="join-err" id="joinErr"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div class="screen" id="s-lobby">
    <div class="lby-badge">Waiting Room</div>
    <div class="lby-code-lbl">Room code</div>
    <div class="lby-code" id="lby-code">------</div>
    <div class="lby-player-count" id="lby-count">0</div>
    <div class="lby-count-lbl">players joined</div>
    <div class="chips" id="lby-chips"></div>
    <div class="lby-wait pulse">Waiting for the teacher to start&hellip;</div>
  </div>

  <!-- COUNTDOWN -->
  <div class="screen" id="s-countdown">
    <div class="cd-label">Get Ready!</div>
    <div class="cd-num" id="cd-num">3</div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="s-question">
    <div class="q-top">
      <div class="q-meta">
        <div class="q-dots" id="q-dots"></div>
        <div class="timer-arc-wrap">
          <svg class="timer-svg" id="timer-svg" width="44" height="44" viewBox="0 0 44 44">
            <circle class="timer-bg" cx="22" cy="22" r="18"/>
            <circle class="timer-fg" id="timer-arc" cx="22" cy="22" r="18"
              stroke-dasharray="113" stroke-dashoffset="0" stroke="#4f78ff"/>
            <text id="timer-label" class="timer-text" x="22" y="22"
              dominant-baseline="central" text-anchor="middle"
              style="transform:rotate(90deg);transform-origin:22px 22px;fill:#fff">20</text>
          </svg>
        </div>
      </div>
      <div class="q-txt" id="q-txt">Loading&hellip;</div>
      <button class="q-tts-btn" id="q-tts-inner" onclick="readCurrentQuestion()" style="display:none">🔊 Read aloud</button>
    </div>
    <div class="q-body" id="q-body"></div>
  </div>

  <!-- REVEAL -->
  <div class="screen" id="s-reveal">
    <div class="reveal-top">
      <div class="reveal-q" id="reveal-q-txt"></div>
      <div class="reveal-opts" id="reveal-opts"></div>
      <div class="reveal-stat" id="reveal-stat"></div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="screen" id="s-leaderboard">
    <div class="lb-hdr">Leaderboard</div>
    <div class="lb-list" id="lb-list"></div>
    <div class="lb-next-auto" id="lb-next-auto"></div>
  </div>

  <!-- FINAL -->
  <div class="screen" id="s-final">
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Final Results</div>
    <div class="lb-hdr">Game Over!</div>
    <div class="final-podium" id="final-podium"></div>
    <div class="final-rank-badge" id="final-rank-badge"></div>
    <div class="final-score-big" id="final-score-big">0</div>
    <div class="final-score-lbl">your total score</div>
    <button class="play-again-btn" onclick="location.reload()">Play Again</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
(function(){
'use strict';

var P       = new URLSearchParams(window.location.search);
var GAS_URL = (P.get('script')||'').trim();
var preCode = (P.get('room')||'').trim().toUpperCase();

/* ═══ SOUND ENGINE ═══ */
var soundOn=true, actx=null;
var AudioCtx=window.AudioContext||window.webkitAudioContext;

function getAC(){ if(!actx){ try{actx=new AudioCtx();}catch(e){} } return actx; }
function unlockAC(){ var a=getAC(); if(a&&a.state==='suspended') a.resume(); }

function playTone(freq,type,dur,vol,ramp){
  if(!soundOn) return;
  var a=getAC(); if(!a) return;
  try{
    var o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,a.currentTime);
    if(ramp) g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}

/* Background music — upbeat procedural */
var bgHandle=null, bgGainNode=null;
function startBGMusic(){
  if(!soundOn) return;
  stopBGMusic();
  var a=getAC(); if(!a) return;
  try{
    bgGainNode=a.createGain(); bgGainNode.gain.value=0.04; bgGainNode.connect(a.destination);
    var melody=[261,294,330,349,392,440,494,523];
    var bass  =[130,146,165,174];
    var step=0;
    function tick(){
      if(!bgGainNode||!soundOn) return;
      /* Melody */
      var mo=a.createOscillator(), mg=a.createGain();
      mo.connect(mg); mg.connect(bgGainNode);
      mo.type='triangle'; mo.frequency.value=melody[step%melody.length];
      mg.gain.setValueAtTime(0.6,a.currentTime); mg.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.22);
      mo.start(); mo.stop(a.currentTime+0.24);
      /* Bass on beat */
      if(step%4===0){
        var bo=a.createOscillator(), bg2=a.createGain();
        bo.connect(bg2); bg2.connect(bgGainNode);
        bo.type='sawtooth'; bo.frequency.value=bass[Math.floor(step/4)%bass.length];
        bg2.gain.setValueAtTime(0.4,a.currentTime); bg2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.18);
        bo.start(); bo.stop(a.currentTime+0.2);
      }
      step++;
      bgHandle=setTimeout(tick,step%2===0?200:240);
    }
    tick();
  }catch(e){}
}
function stopBGMusic(){ if(bgHandle){clearTimeout(bgHandle);bgHandle=null;} try{if(bgGainNode){bgGainNode.disconnect();bgGainNode=null;}}catch(e){} }

function playCorrect(){ playTone(660,'square',.08,.12,true); setTimeout(function(){playTone(880,'square',.12,.1,true);},80); }
function playWrong(){ playTone(160,'sawtooth',.22,.15,true); }
function playCountdownBeep(){ playTone(880,'sine',.12,.12,true); }
function playCountdownGo(){ [523,659,784,1047].forEach(function(n,i){ setTimeout(function(){playTone(n,'triangle',.3,.13,true);},i*120); }); }
function playTick(){ playTone(1200,'sine',.04,.05,true); }

function toggleSound(){
  soundOn=!soundOn;
  var btn=document.getElementById('soundBtn');
  btn.textContent=soundOn?'🎵':'🔇';
  btn.classList.toggle('muted',!soundOn);
  if(soundOn) startBGMusic(); else stopBGMusic();
}

/* ═══ TTS ═══ */
var ttsOn=false, currentUtt=null;
function toggleTTS(){
  ttsOn=!ttsOn;
  var btn=document.getElementById('ttsBtn');
  btn.textContent=ttsOn?'🔊':'🔕';
}
function readCurrentQuestion(){
  if(!('speechSynthesis' in window)) return;
  var qTxt=(document.getElementById('q-txt')||{}).textContent||'';
  var opts=Array.from(document.querySelectorAll('.opt-btn')).map(function(b,i){ return String.fromCharCode(65+i)+': '+(b.querySelector('.opt-txt')||b).textContent.trim(); });
  var full=qTxt+'. '+opts.join('. ');
  if(currentUtt){ window.speechSynthesis.cancel(); currentUtt=null; var btn=document.getElementById('q-tts-inner'); if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read aloud';} return; }
  currentUtt=new SpeechSynthesisUtterance(full);
  currentUtt.rate=0.9;
  currentUtt.onend=function(){ currentUtt=null; var btn=document.getElementById('q-tts-inner'); if(btn){btn.classList.remove('speaking');btn.textContent='🔊 Read aloud';} };
  window.speechSynthesis.speak(currentUtt);
  var btn=document.getElementById('q-tts-inner'); if(btn){btn.classList.add('speaking');btn.textContent='⏹ Stop';}
}

/* ═══ HELPERS ═══ */
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});var t=document.getElementById(id);if(t)t.classList.add('on');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function el(id){return document.getElementById(id);}
function gasPost(body,cb){
  fetch(GAS_URL,{method:'POST',body:JSON.stringify(body)})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){cb(null,d);}).catch(function(e){cb(e,null);});
}
function isImageUrl(s){ return s&&(s.startsWith('http'))&&(s.match(/\.(jpg|jpeg|png|gif|webp)/i)||s.includes('drive.google.com')||s.includes('usercontent.com')); }

/* ═══ STATE ═══ */
var sessionId='',playerId='',playerName='';
var questions=[],totalQ=0,timePerQ=20;
var currentQIdx=-1,answered=false,correctAnswer=null;
var roundTimeout=null,timerRaf=null,qStartAt_ms=0;
var streak=0,totalScore=0;
var stateRef=null,playersRef=null,lobbyPRef=null;
var SHAPES=['&#9650;','&#9632;','&#9679;','&#9830;'];
var COLORS=['k-red','k-blue','k-yellow','k-green'];
var tickCount=0, lastTickSecond=-1;
var ARC_TOTAL=113;

/* ═══ BOOT ═══ */
if(!GAS_URL){show('s-join');el('joinErr').textContent='Missing ?script= in URL.';}
else{show('s-join');if(preCode)el('inp-code').value=preCode;}

el('inp-code').addEventListener('keydown',function(e){if(e.key==='Enter')el('inp-name').focus();});
el('inp-name').addEventListener('keydown',function(e){if(e.key==='Enter')doJoin();});
el('joinBtn').addEventListener('click',doJoin);
if('speechSynthesis' in window){el('ttsBtn').style.display=''; el('q-tts-inner').style.display='';}

/* ═══ JOIN ═══ */
function doJoin(){
  unlockAC();
  var btn=el('joinBtn'), errEl=el('joinErr');
  sessionId=(el('inp-code').value||'').trim().toUpperCase();
  playerName=(el('inp-name').value||'').trim();
  errEl.textContent='';
  if(sessionId.length<4){errEl.textContent='Enter a valid room code';return;}
  if(playerName.length<2){errEl.textContent='Enter your name (at least 2 characters)';return;}
  btn.disabled=true; btn.innerHTML='<span class="spin-icon"></span>Joining…';
  playerId='p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  gasPost({action:'getKahootSession',sessionId:sessionId},function(err,res){
    if(err||!res||res.status!=='success'){
      btn.disabled=false; btn.textContent='Join Quiz';
      errEl.textContent=(res&&res.message)||'Room not found — check your code.'; return;
    }
    questions=res.data.questions||[]; totalQ=res.data.totalQ||questions.length; timePerQ=res.data.timePerQ||20;
    db.ref('kahoot/'+sessionId+'/players/'+playerId).set({name:playerName,score:0,streak:0,progress:0,finished:false,joinedAt:firebase.database.ServerValue.TIMESTAMP});
    el('lby-code').textContent=sessionId;
    buildDots();
    show('s-lobby');
    startBGMusic();
    btn.disabled=false; btn.textContent='Join Quiz';
    watchLobbyPlayers();
    watchGameState();
  });
}

function buildDots(){
  var wrap=el('q-dots'); wrap.innerHTML='';
  for(var i=0;i<Math.min(totalQ,20);i++){
    var d=document.createElement('div'); d.className='q-dot'; d.id='dot-'+i; wrap.appendChild(d);
  }
}
function setDot(idx){
  for(var i=0;i<Math.min(totalQ,20);i++){
    var d=el('dot-'+i); if(!d) continue;
    d.className='q-dot'+(i<idx?' done':i===idx?' active':'');
  }
}

function watchLobbyPlayers(){
  lobbyPRef=db.ref('kahoot/'+sessionId+'/players');
  lobbyPRef.on('value',function(snap){
    var players=(snap&&snap.val())||{};
    var names=Object.values(players).map(function(p){return p.name||'?';});
    el('lby-count').textContent=names.length;
    el('lby-chips').innerHTML=names.map(function(n){return '<div class="chip">'+esc(n)+'</div>';}).join('');
  });
}

function watchGameState(){
  stateRef=db.ref('kahoot/'+sessionId+'/state');
  stateRef.on('value',function(snap){
    var st=(snap&&snap.val())||{};
    var phase=st.phase||'lobby';
    if(phase==='countdown'){ detachLobby(); startCountdown(st.countdownValue||3); }
    else if(phase==='question'){
      if(st.timePerQ) timePerQ=st.timePerQ;
      var qi=parseInt(st.qIndex)||0;
      if(qi!==currentQIdx) startQuestion(qi,st.qStartAt||Date.now());
    }
    else if(phase==='reveal'){ showReveal(st.qIndex,st.correctAnswer); }
    else if(phase==='leaderboard'){ showLeaderboard(st.autoAdvanceAt); }
    else if(phase==='final'){ showFinal(); }
  });
  playersRef=db.ref('kahoot/'+sessionId+'/players');
}
function detachLobby(){
  if(lobbyPRef){try{lobbyPRef.off('value');}catch(_){}lobbyPRef=null;}
}

/* ═══ COUNTDOWN ═══ */
function startCountdown(from){
  stopBGMusic();
  show('s-countdown');
  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}
  var num=from; el('cd-num').textContent=num;
  playCountdownBeep();
  var iv=setInterval(function(){
    num--;
    if(num<=0){clearInterval(iv);playCountdownGo();return;}
    el('cd-num').textContent=num;
    el('cd-num').style.animation='none';
    void el('cd-num').offsetHeight;
    el('cd-num').style.animation='cdPop .5s cubic-bezier(.17,.67,.46,1.41)';
    playCountdownBeep();
  },1000);
}

/* ═══ QUESTION ═══ */
function startQuestion(qi,qStartAt){
  clearTimeout(roundTimeout); stopTimer();
  answered=false; correctAnswer=null; currentQIdx=qi; qStartAt_ms=qStartAt;
  lastTickSecond=-1;
  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}
  var q=questions[qi]; if(!q) return;
  setDot(qi);
  el('q-txt').textContent=q.question;
  renderAnswerArea(q);
  show('s-question');
  /* Reset TTS button */
  var ttsBtnI=el('q-tts-inner');
  if(ttsBtnI){ttsBtnI.classList.remove('speaking');ttsBtnI.textContent='🔊 Read aloud';}
  var msLeft=(qStartAt_ms+timePerQ*1000)-Date.now();
  if(msLeft<=0) msLeft=3000;
  runTimer();
  roundTimeout=setTimeout(function(){ if(!answered) timeOut(); },msLeft);
  /* Auto-read if TTS enabled */
  if(ttsOn) setTimeout(readCurrentQuestion,300);
}

function renderAnswerArea(q){
  var body=el('q-body'); body.innerHTML='';
  if(q.type==='MCQ'||q.type==='TF'){
    var grid=document.createElement('div'); grid.className='opts-grid';
    (q.options||[]).forEach(function(opt,i){
      var btn=document.createElement('button');
      var imgUrl=isImageUrl(opt);
      if(imgUrl){
        btn.className='opt-btn '+COLORS[i%4]+' has-img';
        var img=document.createElement('img'); img.className='opt-img'; img.src=opt; img.alt='Option '+(i+1);
        var lbl=document.createElement('span'); lbl.style.fontSize='12px'; lbl.textContent='Option '+(i+1);
        btn.appendChild(img); btn.appendChild(lbl);
      } else {
        btn.className='opt-btn '+COLORS[i%4];
        btn.innerHTML='<span class="opt-shape">'+SHAPES[i%4]+'</span><span class="opt-txt">'+esc(opt)+'</span>';
      }
      btn.dataset.answer=opt; btn.dataset.index=i;
      /* FAST: pointerdown for immediate response */
      btn.addEventListener('pointerdown',(function(o,b){ return function(ev){ ev.preventDefault(); if(!answered) submitAnswer(o,b); }; })(opt,btn));
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  } else {
    var area=document.createElement('div'); area.className='short-area';
    var inp=document.createElement('input'); inp.className='short-inp'; inp.type='text';
    inp.placeholder='Type your answer and press Enter'; inp.maxLength=120; inp.autocomplete='off';
    var sb=document.createElement('button'); sb.className='sub-btn'; sb.textContent='Submit';
    sb.addEventListener('pointerdown',function(ev){ev.preventDefault();if(!answered&&inp.value.trim())submitAnswer(inp.value.trim(),null);});
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!answered&&inp.value.trim())submitAnswer(inp.value.trim(),null);});
    area.appendChild(inp); area.appendChild(sb); body.appendChild(area);
    setTimeout(function(){inp.focus();},80);
  }
}

/* ═══ TIMER ═══ */
function runTimer(){
  stopTimer();
  var arc=el('timer-arc'), lbl=el('timer-label');
  function tick(){
    var deadline=qStartAt_ms+timePerQ*1000;
    var left=Math.max(0,(deadline-Date.now())/1000);
    var ratio=left/timePerQ;
    arc.setAttribute('stroke-dashoffset',ARC_TOTAL*(1-ratio));
    arc.setAttribute('stroke',ratio>.5?'#4ade80':ratio>.25?'#f59e0b':'#ef4444');
    lbl.textContent=Math.ceil(left);
    /* Tick sound on last 5 seconds */
    var secLeft=Math.ceil(left);
    if(secLeft<=5&&secLeft!==lastTickSecond){ lastTickSecond=secLeft; playTick(); }
    if(left>0) timerRaf=requestAnimationFrame(tick);
  }
  timerRaf=requestAnimationFrame(tick);
}
function stopTimer(){ if(timerRaf){cancelAnimationFrame(timerRaf);timerRaf=null;} }

/* ═══ SUBMIT ═══ */
function submitAnswer(answer,btnEl){
  if(answered) return;
  answered=true;
  clearTimeout(roundTimeout); stopTimer();
  /* IMMEDIATE disable all options */
  el('q-body').querySelectorAll('.opt-btn').forEach(function(b){ b.disabled=true; });
  if(btnEl) btnEl.classList.add('selected');
  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}
  el('q-body').innerHTML='<div class="answered-msg"><span class="big">✔</span>Answer submitted! Waiting…</div>';
  var deadline=qStartAt_ms+timePerQ*1000;
  var timeRemaining=Math.max(0,(deadline-Date.now())/1000);
  gasPost({action:'validateKahootAnswer',sessionId:sessionId,playerId:playerId,qIndex:currentQIdx,answer:answer,timeRemaining:timeRemaining,currentStreak:streak},function(err,res){
    if(!err&&res&&res.status==='success'){
      var d=res.data;
      if(d.isCorrect){streak=d.newStreak;totalScore=d.totalScore;playCorrect();}
      else{streak=0;playWrong();}
      correctAnswer={isCorrect:d.isCorrect,points:d.pointsEarned,streak:streak,total:d.totalScore};
      db.ref('kahoot/'+sessionId+'/players/'+playerId).update({score:d.totalScore||0,streak:d.newStreak||0,progress:d.progress||0,finished:(currentQIdx+1)>=totalQ,updatedAt:firebase.database.ServerValue.TIMESTAMP});
    }
  });
}

function timeOut(){
  if(answered) return;
  answered=true; stopTimer();
  el('q-body').querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;});
  el('q-body').innerHTML='<div class="answered-msg"><span class="big">⏱</span>Time\'s up!</div>';
  playWrong();
  gasPost({action:'validateKahootAnswer',sessionId:sessionId,playerId:playerId,qIndex:currentQIdx,answer:'',timeRemaining:0,currentStreak:streak},function(err,res){
    if(!err&&res&&res.status==='success'){ streak=0; correctAnswer={isCorrect:false,points:0,streak:0,total:res.data.totalScore||totalScore}; }
  });
}

/* ═══ REVEAL ═══ */
function showReveal(qi,serverCorrect){
  stopTimer(); clearTimeout(roundTimeout);
  if(currentUtt){window.speechSynthesis.cancel();currentUtt=null;}
  var q=questions[qi]||questions[currentQIdx]; if(!q) return;
  var correct=serverCorrect||'';
  el('reveal-q-txt').textContent=q.question;
  var optsWrap=el('reveal-opts'); optsWrap.innerHTML='';
  if(q.type==='MCQ'||q.type==='TF'){
    (q.options||[]).forEach(function(opt,i){
      var isC=opt.toLowerCase()===correct.toLowerCase()||String.fromCharCode(65+i)===correct.toUpperCase();
      var div=document.createElement('div');
      var imgUrl=isImageUrl(opt);
      if(imgUrl){
        div.className='reveal-opt '+(isC?'correct':'wrong')+' has-img';
        var img=document.createElement('img'); img.className='reveal-opt-img'; img.src=opt; img.alt='Option '+(i+1);
        var lbl=document.createElement('span'); lbl.style.fontSize='11px'; lbl.textContent=(isC?'✓ ':'')+'Option '+(i+1);
        div.appendChild(img); div.appendChild(lbl);
      } else {
        div.className='reveal-opt '+(isC?'correct':'wrong');
        div.innerHTML='<div class="reveal-opt-shape">'+SHAPES[i%4]+'</div><span>'+esc(opt)+'</span>'+(isC?' ✓':'');
      }
      optsWrap.appendChild(div);
    });
  }
  var stat=el('reveal-stat');
  if(correctAnswer){
    var isC=correctAnswer.isCorrect;
    stat.innerHTML='<div class="rs-your">'+(isC?'Correct! 🎉':'Wrong ✗')+'</div>'+
      '<div class="rs-pts '+(isC?'correct':'wrong')+'">'+(isC?'+'+correctAnswer.points:'0')+'</div>'+
      (isC&&correctAnswer.streak>1?'<div class="rs-streak">🔥 '+correctAnswer.streak+' in a row!</div>':'');
  } else {
    stat.innerHTML='<div class="rs-your" style="color:#f87171">No answer submitted</div>';
  }
  show('s-reveal');
}

/* ═══ LEADERBOARD ═══ */
function showLeaderboard(autoAdvanceAt){
  playersRef.once('value',function(snap){
    var players=(snap&&snap.val())||{};
    var sorted=Object.entries(players).sort(function(a,b){return (b[1].score||0)-(a[1].score||0);});
    var medals=['🥇','🥈','🥉'];
    el('lb-list').innerHTML=sorted.slice(0,10).map(function(e,i){
      var pid=e[0],p=e[1],isMe=pid===playerId;
      return '<div class="lb-row'+(isMe?' lb-me':'')+'" style="animation-delay:'+i*60+'ms">'+
        '<div class="lb-rank">'+(medals[i]||(i+1))+'</div>'+
        '<div class="lb-name">'+esc(p.name)+(p.finished?' 🏁':'')+'</div>'+
        '<div class="lb-score">'+((p.score||0).toLocaleString())+'</div>'+
        (p.streak>2?'<div class="lb-streak">🔥'+p.streak+'</div>':'')+
        '</div>';
    }).join('');
    show('s-leaderboard');
    if(autoAdvanceAt){
      var cd=Math.max(1,Math.ceil((autoAdvanceAt-Date.now())/1000));
      var iv2=setInterval(function(){ cd--; el('lb-next-auto').textContent=cd>0?'Next in '+cd+'s':'Loading…'; if(cd<=0)clearInterval(iv2); },1000);
      el('lb-next-auto').textContent='Next in '+cd+'s';
    } else { el('lb-next-auto').textContent='Waiting for teacher…'; }
  });
}

/* ═══ FINAL ═══ */
function showFinal(){
  stopTimer(); clearTimeout(roundTimeout); stopBGMusic();
  [523,659,784,1047,1318].forEach(function(n,i){setTimeout(function(){playTone(n,'triangle',.4,.14,true);},i*140);});
  playersRef.once('value',function(snap){
    var players=(snap&&snap.val())||{};
    var sorted=Object.entries(players).sort(function(a,b){return (b[1].score||0)-(a[1].score||0);});
    var podiumOrder=[1,0,2], pClasses=['p2','p1','p3'];
    var podium=el('final-podium'); podium.innerHTML='';
    podiumOrder.forEach(function(rank,slot){
      var entry=sorted[rank]; if(!entry) return;
      var p=entry[1], div=document.createElement('div');
      div.className='podium-slot '+pClasses[slot];
      div.innerHTML='<div class="podium-avatar">'+(p.name||'?').slice(0,2).toUpperCase()+'</div>'+
        '<div class="podium-name">'+esc(p.name)+'</div>'+
        '<div class="podium-score">'+((p.score||0).toLocaleString())+'</div><div class="podium-bar"></div>';
      podium.appendChild(div);
    });
    var myRank=sorted.findIndex(function(e){return e[0]===playerId;});
    var myScore=sorted[myRank]?(sorted[myRank][1].score||0):totalScore;
    var rankStr=myRank===0?'1st':myRank===1?'2nd':myRank===2?'3rd':(myRank+1)+'th';
    el('final-rank-badge').textContent='You finished '+rankStr+' out of '+sorted.length+' players';
    el('final-score-big').textContent=myScore.toLocaleString();
    show('s-final');
  });
}

window.addEventListener('beforeunload',function(){
  stopTimer(); clearTimeout(roundTimeout); stopBGMusic();
  if(stateRef){try{stateRef.off('value');}catch(_){}}
  if(playersRef){try{playersRef.off('value');}catch(_){}}
  if(lobbyPRef){try{lobbyPRef.off('value');}catch(_){}}
  if(playerId&&sessionId) db.ref('kahoot/'+sessionId+'/players/'+playerId+'/online').set(false);
});

}());
