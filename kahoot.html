<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizFlow — Kahoot Quiz</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --track: #334155;
      --txt: #f8fafc;
      --muted: #94a3b8;
      --f: system-ui, sans-serif;

      --k-red:    #e21b3c;
      --k-blue:   #1368ce;
      --k-yellow: #d89e00;
      --k-green:  #26890c;

      --k-red-h:    #c0172f;
      --k-blue-h:   #0f55a8;
      --k-yellow-h: #b07e00;
      --k-green-h:  #1d6a09;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--f);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .wrap { max-width: 720px; width: 100%; }
    .screen { display: none; }
    .screen.on { display: block; }

    /* ── JOIN ── */
    #s-join { text-align: center; padding: 48px 20px; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
    .brand-dot { width: 14px; height: 14px; border-radius: 50%; }
    .brand-dot:nth-child(1) { background: var(--k-red); }
    .brand-dot:nth-child(2) { background: var(--k-blue); }
    .brand-dot:nth-child(3) { background: var(--k-yellow); }
    .brand-dot:nth-child(4) { background: var(--k-green); }
    .brand h1 { font-size: 28px; font-weight: 800; color: #fff; }
    .join-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .join-card {
      background: var(--panel);
      border-radius: 16px;
      padding: 28px;
      max-width: 360px;
      margin: 0 auto;
      border: 1px solid #2d3a52;
    }
    .field-lbl { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; text-align: left; }
    .inp {
      display: block; width: 100%; padding: 13px 14px;
      background: #0f172a; border: 1.5px solid #2d3a52;
      border-radius: 10px; color: var(--txt); font-size: 15px;
      font-family: var(--f); outline: none; transition: border-color .15s; margin-bottom: 14px;
    }
    .inp:focus { border-color: #4f78ff; }
    .inp-code { text-transform: uppercase; letter-spacing: 6px; font-family: monospace; font-size: 20px; text-align: center; }
    .join-btn {
      width: 100%; padding: 14px; background: #4f78ff;
      color: #fff; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 800; font-family: var(--f);
      cursor: pointer; transition: background .15s, transform .1s; margin-top: 4px;
    }
    .join-btn:hover { background: #3a5fcc; }
    .join-btn:active { transform: scale(.98); }
    .join-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .join-err { color: #f87171; font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }

    /* ── LOBBY ── */
    #s-lobby { text-align: center; padding: 36px 20px; }
    .lby-badge {
      display: inline-block; background: #4f78ff22; border: 1px solid #4f78ff55;
      border-radius: 20px; padding: 4px 16px; font-size: 12px; font-weight: 600; color: #7fa4ff;
      margin-bottom: 16px;
    }
    .lby-code-lbl { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .lby-code { font-family: monospace; font-size: clamp(44px, 12vw, 70px); font-weight: 800; letter-spacing: 10px; color: #fff; margin-bottom: 4px; }
    .lby-player-count { font-size: 56px; font-weight: 900; color: #4ade80; font-family: monospace; margin-top: 16px; line-height: 1; }
    .lby-count-lbl { font-size: 13px; color: var(--muted); margin: 4px 0 20px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 580px; margin: 0 auto 20px; min-height: 40px; }
    .chip {
      padding: 6px 16px; background: var(--panel); border: 1px solid var(--track);
      border-radius: 20px; font-size: 13px; font-weight: 600;
      animation: pop .22s ease;
    }
    @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .lby-wait { font-size: 14px; color: var(--muted); }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    /* ── COUNTDOWN ── */
    #s-countdown { text-align: center; padding: 80px 20px; }
    .cd-label { font-size: 16px; color: var(--muted); font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .cd-num {
      font-size: clamp(80px, 24vw, 140px); font-weight: 900; font-family: monospace;
      line-height: 1; color: #fff;
      animation: cd-pop .5s cubic-bezier(.17,.67,.46,1.41);
    }
    @keyframes cd-pop { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── QUESTION ── */
    #s-question {}
    .q-top {
      background: linear-gradient(135deg, #1e2d4a, #1a253e);
      border-radius: 14px 14px 0 0;
      padding: 20px 20px 14px;
      text-align: center;
      border: 1px solid #2d3a52;
      border-bottom: none;
    }
    .q-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: var(--muted); }
    .q-dots { display: flex; gap: 4px; }
    .q-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--track); transition: background .3s; }
    .q-dot.done { background: #4ade80; }
    .q-dot.active { background: #4f78ff; }
    .timer-arc-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .timer-svg { transform: rotate(-90deg); }
    .timer-bg { fill: none; stroke: #2d3a52; stroke-width: 4; }
    .timer-fg { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .2s linear, stroke .5s; }
    .timer-text { font-size: 13px; font-weight: 700; fill: #fff; }
    .q-txt { font-size: clamp(17px, 3.5vw, 22px); font-weight: 700; color: #fff; line-height: 1.4; max-width: 600px; margin: 0 auto; }

    .q-body { background: var(--panel); border: 1px solid #2d3a52; border-radius: 0 0 14px 14px; padding: 16px; }

    .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opt-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 15px 16px;
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 700;
      font-family: var(--f); cursor: pointer;
      transition: transform .1s, filter .15s;
      text-align: left; min-height: 64px;
    }
    .opt-btn:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-2px) scale(1.01); }
    .opt-btn:not(:disabled):active { transform: scale(.97); }
    .opt-btn:disabled { cursor: not-allowed; }
    .opt-btn.k-red    { background: var(--k-red); }
    .opt-btn.k-blue   { background: var(--k-blue); }
    .opt-btn.k-yellow { background: var(--k-yellow); }
    .opt-btn.k-green  { background: var(--k-green); }
    .opt-btn.selected { outline: 4px solid rgba(255,255,255,.7); outline-offset: -4px; }
    .opt-btn.correct  { filter: brightness(1.1); animation: bump .3s ease; }
    .opt-btn.wrong    { filter: brightness(.45) grayscale(.4); }
    .opt-btn.unselected-wrong { filter: brightness(.45) grayscale(.4); }

    @keyframes bump { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    .opt-shape { width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .opt-txt { flex: 1; }

    .short-area { padding: 4px 0; }
    .short-inp {
      width: 100%; padding: 14px; background: #0f172a;
      border: 2px solid #2d3a52; border-radius: 10px;
      color: #fff; font-size: 15px; font-family: var(--f);
      outline: none; margin-bottom: 10px;
    }
    .short-inp:focus { border-color: #4f78ff; }
    .sub-btn {
      width: 100%; padding: 14px; background: #4f78ff;
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: var(--f); cursor: pointer;
    }
    .sub-btn:hover:not(:disabled) { background: #3a5fcc; }
    .sub-btn:disabled { opacity: .5; cursor: not-allowed; }

    .answered-msg {
      text-align: center; padding: 24px; font-size: 15px; font-weight: 600; color: var(--muted);
      animation: fadeIn .4s ease;
    }
    .answered-msg .big { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ── REVEAL ── */
    #s-reveal { padding: 10px 0; }
    .reveal-top { text-align: center; margin-bottom: 16px; }
    .reveal-q { font-size: 16px; font-weight: 600; color: var(--muted); margin-bottom: 12px; max-width: 600px; margin-left: auto; margin-right: auto; }
    .reveal-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .reveal-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; border-radius: 10px; font-size: 14px; font-weight: 600;
    }
    .reveal-opt.correct { background: var(--k-green); color: #fff; }
    .reveal-opt.wrong   { background: var(--track); color: var(--muted); filter: brightness(.7); }
    .reveal-opt-shape { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .reveal-stat {
      text-align: center; padding: 12px 0; margin-bottom: 16px;
    }
    .reveal-stat .rs-your { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
    .reveal-stat .rs-pts { font-size: 36px; font-weight: 900; font-family: monospace; }
    .reveal-stat .rs-pts.correct { color: #4ade80; }
    .reveal-stat .rs-pts.wrong   { color: #f87171; }
    .reveal-stat .rs-streak { font-size: 13px; color: #f59e0b; margin-top: 2px; }

    /* ── LEADERBOARD ── */
    #s-leaderboard { text-align: center; padding: 16px 0; }
    .lb-hdr { font-size: 20px; font-weight: 800; margin-bottom: 18px; }
    .lb-list { max-width: 480px; margin: 0 auto 20px; display: flex; flex-direction: column; gap: 8px; }
    .lb-row {
      display: flex; align-items: center; padding: 12px 16px;
      border-radius: 10px; gap: 10px; font-weight: 600;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .lb-row:nth-child(1) { background: linear-gradient(90deg, #b8860b44, transparent); border: 1px solid #b8860b66; }
    .lb-row:nth-child(2) { background: linear-gradient(90deg, #64748b44, transparent); border: 1px solid #64748b66; }
    .lb-row:nth-child(3) { background: linear-gradient(90deg, #92400e44, transparent); border: 1px solid #92400e55; }
    .lb-row:nth-child(n+4) { background: var(--panel); border: 1px solid #2d3a52; }
    .lb-rank { width: 28px; font-size: 18px; text-align: center; }
    .lb-name { flex: 1; font-size: 15px; text-align: left; }
    .lb-score { font-family: monospace; font-size: 16px; font-weight: 700; color: #4ade80; }
    .lb-streak { font-size: 12px; color: #f59e0b; margin-left: 4px; }
    .lb-me { outline: 2px solid #4f78ff; outline-offset: -2px; border-radius: 10px; }
    .lb-next-btn {
      padding: 13px 36px; background: #4f78ff; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 800;
      font-family: var(--f); cursor: pointer; margin-top: 8px;
    }
    .lb-next-btn:hover { background: #3a5fcc; }
    .lb-next-auto { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* ── FINAL ── */
    #s-final { text-align: center; padding: 48px 20px; }
    .final-podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin: 24px auto; max-width: 380px; }
    .podium-slot { flex: 1; text-align: center; }
    .podium-avatar { width: 52px; height: 52px; border-radius: 50%; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .podium-name { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-score { font-size: 13px; font-weight: 700; color: #4ade80; font-family: monospace; margin-bottom: 4px; }
    .podium-bar { border-radius: 6px 6px 0 0; width: 100%; }
    .p1 .podium-bar { height: 90px; background: #b8860b; }
    .p2 .podium-bar { height: 60px; background: #64748b; }
    .p3 .podium-bar { height: 44px; background: #92400e; }
    .p1 .podium-avatar { background: #b8860b44; color: #f59e0b; border: 2px solid #b8860b; }
    .p2 .podium-avatar { background: #64748b44; color: #94a3b8; border: 2px solid #64748b; }
    .p3 .podium-avatar { background: #92400e44; color: #d97706; border: 2px solid #92400e; }
    .final-rank-badge { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
    .final-score-big { font-size: 52px; font-weight: 900; font-family: monospace; color: #4ade80; line-height: 1; margin-bottom: 4px; }
    .final-score-lbl { font-size: 14px; color: var(--muted); }
    .play-again-btn {
      margin-top: 28px; padding: 14px 40px; background: #4f78ff;
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: var(--f); cursor: pointer;
    }
    .play-again-btn:hover { background: #3a5fcc; }

    /* ── UTILS ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
      border-radius: 50%; animation: spinR .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spinR { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .opts-grid, .reveal-opts { grid-template-columns: 1fr; }
      .opt-btn { min-height: 56px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- JOIN -->
  <div class="screen on" id="s-join">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-dot"></div>
      <h1>QuizFlow Live</h1>
      <div class="brand-dot"></div>
      <div class="brand-dot"></div>
    </div>
    <p class="join-sub">Enter the room code your teacher shared</p>
    <div class="join-card">
      <div class="field-lbl">Room Code</div>
      <input class="inp inp-code" id="inp-code" type="text" placeholder="ABCD12" maxlength="8" autocomplete="off" spellcheck="false">
      <div class="field-lbl">Your Name</div>
      <input class="inp" id="inp-name" type="text" placeholder="e.g. Adisa O." maxlength="20" autocomplete="off">
      <button class="join-btn" id="joinBtn">Join Quiz</button>
      <div class="join-err" id="joinErr"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div class="screen" id="s-lobby">
    <div class="lby-badge">Waiting Room</div>
    <div class="lby-code-lbl">Room code</div>
    <div class="lby-code" id="lby-code">------</div>
    <div class="lby-player-count" id="lby-count">0</div>
    <div class="lby-count-lbl">players joined</div>
    <div class="chips" id="lby-chips"></div>
    <div class="lby-wait pulse">Waiting for the teacher to start&hellip;</div>
  </div>

  <!-- COUNTDOWN -->
  <div class="screen" id="s-countdown">
    <div class="cd-label">Get Ready!</div>
    <div class="cd-num" id="cd-num">3</div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="s-question">
    <div class="q-top">
      <div class="q-meta">
        <div class="q-dots" id="q-dots"></div>
        <div class="timer-arc-wrap">
          <svg class="timer-svg" id="timer-svg" width="44" height="44" viewBox="0 0 44 44">
            <circle class="timer-bg" cx="22" cy="22" r="18"/>
            <circle class="timer-fg" id="timer-arc" cx="22" cy="22" r="18"
              stroke-dasharray="113" stroke-dashoffset="0" stroke="#4f78ff"/>
            <text id="timer-label" class="timer-text" x="22" y="22"
              dominant-baseline="central" text-anchor="middle"
              style="transform: rotate(90deg); transform-origin: 22px 22px; fill: #fff;">20</text>
          </svg>
        </div>
      </div>
      <div class="q-txt" id="q-txt">Loading&hellip;</div>
    </div>
    <div class="q-body" id="q-body"></div>
  </div>

  <!-- REVEAL (after answer / time up) -->
  <div class="screen" id="s-reveal">
    <div class="reveal-top">
      <div class="reveal-q" id="reveal-q-txt"></div>
      <div class="reveal-opts" id="reveal-opts"></div>
      <div class="reveal-stat" id="reveal-stat"></div>
    </div>
  </div>

  <!-- LEADERBOARD (between rounds) -->
  <div class="screen" id="s-leaderboard">
    <div class="lb-hdr">Leaderboard</div>
    <div class="lb-list" id="lb-list"></div>
    <div class="lb-next-auto" id="lb-next-auto"></div>
  </div>

  <!-- FINAL -->
  <div class="screen" id="s-final">
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Final Results</div>
    <div class="lb-hdr">Game Over!</div>
    <div class="final-podium" id="final-podium"></div>
    <div class="final-rank-badge" id="final-rank-badge"></div>
    <div class="final-score-big" id="final-score-big">0</div>
    <div class="final-score-lbl">your total score</div>
    <button class="play-again-btn" onclick="location.reload()">Play Again</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
(function () {
'use strict';

/* ── URL params ── */
var P       = new URLSearchParams(window.location.search);
var GAS_URL = (P.get('script') || '').trim();
var preCode = (P.get('room')   || '').trim().toUpperCase();

/* ── Helpers ── */
function show(id) {
  document.querySelectorAll('.screen').forEach(function (s) { s.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function el(id) { return document.getElementById(id); }

function gasPost(body, cb) {
  fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (d) { cb(null, d); })
    .catch(function (e) { cb(e, null); });
}

/* ── Firebase ── */
var db;
try {
  var cfg = {
    apiKey:            'AIzaSyCLfySFzCpbz3CBX1bjha5KxvA0MrJExIc',
    authDomain:        'kahoot-24063.firebaseapp.com',
    databaseURL:       'https://kahoot-24063-default-rtdb.firebaseio.com',
    projectId:         'kahoot-24063',
    storageBucket:     'kahoot-24063.firebasestorage.app',
    messagingSenderId: '962917873467',
    appId:             '1:962917873467:web:a6b526aee30cd15c92291e'
  };
  var existing = null;
  firebase.apps.forEach(function (a) { if (a.name === 'kh') existing = a; });
  var fbApp = existing || firebase.initializeApp(cfg, 'kh');
  db = firebase.database(fbApp);
} catch (e) {
  console.error('[kahoot] Firebase init failed:', e.message);
}

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
var sessionId   = '';
var playerId    = '';
var playerName  = '';
var questions   = [];
var totalQ      = 0;
var timePerQ    = 20;

/* Per-round local state */
var currentQIdx   = -1;
var answered      = false;
var correctAnswer = null;   /* set after GAS validates */
var roundTimeout  = null;
var timerRaf      = null;
var qStartAt_ms   = 0;      /* absolute ms — THE single source of truth for timing */
var streak        = 0;
var totalScore    = 0;

/* Firebase listener refs */
var stateRef    = null;
var playersRef  = null;
var lobbyPRef   = null;

var SHAPES  = ['&#9650;','&#9632;','&#9679;','&#9830;'];  /* triangle square circle diamond */
var COLORS  = ['k-red','k-blue','k-yellow','k-green'];

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
if (!GAS_URL) {
  show('s-join');
  el('joinErr').textContent = 'Missing ?script= in URL — open this page from the QuizFlow student portal.';
  el('joinBtn').disabled = true;
} else {
  show('s-join');
  if (preCode) el('inp-code').value = preCode;
}

el('inp-code').addEventListener('keydown', function (e) { if (e.key === 'Enter') el('inp-name').focus(); });
el('inp-name').addEventListener('keydown', function (e) { if (e.key === 'Enter') doJoin(); });
el('joinBtn').addEventListener('click', doJoin);

/* ─────────────────────────────────────────────
   JOIN
───────────────────────────────────────────── */
function doJoin() {
  var btn = el('joinBtn');
  var errEl = el('joinErr');
  sessionId  = (el('inp-code').value || '').trim().toUpperCase();
  playerName = (el('inp-name').value || '').trim();
  errEl.textContent = '';

  if (sessionId.length < 4)   { errEl.textContent = 'Enter a valid room code'; return; }
  if (playerName.length < 2)  { errEl.textContent = 'Enter your name (at least 2 characters)'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Joining&hellip;';
  playerId = 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);

  gasPost({ action: 'getKahootSession', sessionId: sessionId }, function (err, res) {
    if (err || !res || res.status !== 'success') {
      btn.disabled = false; btn.textContent = 'Join Quiz';
      errEl.textContent = (res && res.message) || 'Room not found — check your code.';
      return;
    }
    questions = res.data.questions || [];
    totalQ    = res.data.totalQ    || questions.length;
    timePerQ  = res.data.timePerQ  || 20;

    /* Register presence */
    db.ref('kahoot/' + sessionId + '/players/' + playerId).set({
      name: playerName, score: 0, streak: 0, progress: 0,
      finished: false, joinedAt: firebase.database.ServerValue.TIMESTAMP
    });

    el('lby-code').textContent = sessionId;
    buildDots();
    show('s-lobby');
    btn.disabled = false; btn.textContent = 'Join Quiz';

    watchLobbyPlayers();
    watchGameState();
  });
}

/* ─────────────────────────────────────────────
   DOTS (question progress bar)
───────────────────────────────────────────── */
function buildDots() {
  var wrap = el('q-dots');
  wrap.innerHTML = '';
  for (var i = 0; i < Math.min(totalQ, 20); i++) {
    var d = document.createElement('div');
    d.className = 'q-dot';
    d.id = 'dot-' + i;
    wrap.appendChild(d);
  }
}
function setDot(idx) {
  for (var i = 0; i < Math.min(totalQ, 20); i++) {
    var d = el('dot-' + i);
    if (!d) continue;
    d.className = 'q-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
  }
}

/* ─────────────────────────────────────────────
   LOBBY — watch players
───────────────────────────────────────────── */
function watchLobbyPlayers() {
  lobbyPRef = db.ref('kahoot/' + sessionId + '/players');
  lobbyPRef.on('value', function (snap) {
    var players = (snap && snap.val()) || {};
    var names   = Object.values(players).map(function (p) { return p.name || '?'; });
    el('lby-count').textContent = names.length;
    el('lby-chips').innerHTML   = names.map(function (n) {
      return '<div class="chip">' + esc(n) + '</div>';
    }).join('');
  });
}

/* ─────────────────────────────────────────────
   STATE MACHINE — driven by Firebase
   Host writes: kahoot/{id}/state/
     phase:     "lobby" | "countdown" | "question" | "reveal" | "leaderboard" | "final"
     qIndex:    current question index (0-based)
     qStartAt:  server timestamp when question began (ms)
───────────────────────────────────────────── */
function watchGameState() {
  stateRef = db.ref('kahoot/' + sessionId + '/state');
  stateRef.on('value', function (snap) {
    var st = (snap && snap.val()) || {};
    var phase = st.phase || 'lobby';

    if (phase === 'countdown') {
      detachLobby();
      startCountdown(st.countdownValue || 3);
    } else if (phase === 'question') {
      var qi = parseInt(st.qIndex) || 0;
      if (qi !== currentQIdx) startQuestion(qi, st.qStartAt || Date.now());
    } else if (phase === 'reveal') {
      showReveal(st.qIndex, st.correctAnswer);
    } else if (phase === 'leaderboard') {
      showLeaderboard(st.autoAdvanceAt);
    } else if (phase === 'final') {
      showFinal();
    }
  });

  /* Also watch players for live leaderboard updates */
  playersRef = db.ref('kahoot/' + sessionId + '/players');
}

function detachLobby() {
  if (lobbyPRef) { try { lobbyPRef.off('value'); } catch (_) {} lobbyPRef = null; }
}

/* ─────────────────────────────────────────────
   COUNTDOWN
───────────────────────────────────────────── */
function startCountdown(from) {
  show('s-countdown');
  var num = from;
  el('cd-num').textContent = num;
  var iv = setInterval(function () {
    num--;
    if (num <= 0) { clearInterval(iv); return; }
    el('cd-num').textContent = num;
    el('cd-num').style.animation = 'none';
    void el('cd-num').offsetHeight;
    el('cd-num').style.animation = 'cd-pop .5s cubic-bezier(.17,.67,.46,1.41)';
  }, 1000);
}

/* ─────────────────────────────────────────────
   QUESTION
───────────────────────────────────────────── */
function startQuestion(qi, qStartAt) {
  clearTimeout(roundTimeout);
  stopTimer();
  answered      = false;
  correctAnswer = null;
  currentQIdx   = qi;

  /* Store the absolute server start time — every calc derives from this */
  qStartAt_ms = qStartAt;

  var q = questions[qi];
  if (!q) return;

  setDot(qi);
  el('q-txt').textContent = q.question;
  renderAnswerArea(q);

  show('s-question');

  /* Calculate how much time is genuinely left right now */
  var msLeft = (qStartAt_ms + timePerQ * 1000) - Date.now();
  if (msLeft <= 0) { timeOut(); return; }

  runTimer();   /* no args — reads qStartAt_ms and timePerQ directly */

  roundTimeout = setTimeout(function () {
    if (!answered) timeOut();
  }, msLeft);
}

function renderAnswerArea(q) {
  var body = el('q-body');
  body.innerHTML = '';

  if (q.type === 'MCQ' || q.type === 'TF') {
    var grid = document.createElement('div');
    grid.className = 'opts-grid';
    (q.options || []).forEach(function (opt, i) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn ' + COLORS[i % 4];
      btn.dataset.answer = opt;
      btn.dataset.index  = i;
      btn.innerHTML = '<span class="opt-shape">' + SHAPES[i % 4] + '</span><span class="opt-txt">' + esc(opt) + '</span>';
      btn.addEventListener('click', function () { if (!answered) submitAnswer(opt, btn); });
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  } else {
    var area = document.createElement('div');
    area.className = 'short-area';
    var inp = document.createElement('input');
    inp.className   = 'short-inp';
    inp.type        = 'text';
    inp.placeholder = 'Type your answer and press Enter';
    inp.maxLength   = 120;
    var sb = document.createElement('button');
    sb.className   = 'sub-btn';
    sb.textContent = 'Submit';
    sb.addEventListener('click', function () { if (!answered && inp.value.trim()) submitAnswer(inp.value.trim(), null); });
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') sb.click(); });
    area.appendChild(inp); area.appendChild(sb);
    body.appendChild(area);
    setTimeout(function () { inp.focus(); }, 80);
  }
}

/* ─────────────────────────────────────────────
   TIMER (arc SVG)
   KEY: every frame recalculates from the shared qStartAt_ms absolute timestamp.
   A student who receives Firebase 2 seconds late gets a 2-second-depleted arc
   immediately — identical to every other student at that moment.
───────────────────────────────────────────── */
var ARC_TOTAL = 113; /* 2π × 18 ≈ 113 */

function runTimer() {
  stopTimer();
  var arc = el('timer-arc');
  var lbl = el('timer-label');

  function tick() {
    /* Left = how many ms remain until qStartAt_ms + full duration */
    var deadline = qStartAt_ms + timePerQ * 1000;
    var left     = Math.max(0, (deadline - Date.now()) / 1000);
    var ratio    = left / timePerQ;                       /* 1→0 over the full duration */
    var offset   = ARC_TOTAL * (1 - ratio);               /* arc drains as ratio falls  */
    arc.setAttribute('stroke-dashoffset', offset);
    arc.setAttribute('stroke', ratio > .5 ? '#4ade80' : ratio > .25 ? '#f59e0b' : '#ef4444');
    lbl.textContent = Math.ceil(left);
    if (left > 0) timerRaf = requestAnimationFrame(tick);
  }
  timerRaf = requestAnimationFrame(tick);
}

function stopTimer() {
  if (timerRaf) { cancelAnimationFrame(timerRaf); timerRaf = null; }
}

/* ─────────────────────────────────────────────
   SUBMIT ANSWER
───────────────────────────────────────────── */
function submitAnswer(answer, btnEl) {
  if (answered) return;
  answered = true;
  clearTimeout(roundTimeout);
  stopTimer();
  disableAnswerArea();

  if (btnEl) btnEl.classList.add('selected');

  /* Time remaining = absolute deadline minus now — same formula as the timer */
  var deadline      = qStartAt_ms + timePerQ * 1000;
  var timeRemaining = Math.max(0, (deadline - Date.now()) / 1000);

  /* Show "answer received" state immediately */
  el('q-body').innerHTML =
    '<div class="answered-msg">' +
    '<span class="big">&#x2714;</span>' +
    'Answer submitted! Waiting for other players&hellip;' +
    '</div>';

  /* Validate with GAS */
  gasPost({
    action:        'validateKahootAnswer',
    sessionId:     sessionId,
    playerId:      playerId,
    qIndex:        currentQIdx,
    answer:        answer,
    timeRemaining: timeRemaining,
    currentStreak: streak
  }, function (err, res) {
    if (!err && res && res.status === 'success') {
      var d = res.data;
      if (d.isCorrect) {
        streak = d.newStreak;
        totalScore = d.totalScore;
      } else {
        streak = 0;
      }
      /* Store result for when reveal phase fires */
      correctAnswer = { isCorrect: d.isCorrect, points: d.pointsEarned, streak: streak, total: d.totalScore };

      /* Update our score in Firebase so leaderboard stays live */
      db.ref('kahoot/' + sessionId + '/players/' + playerId).update({
        score: d.totalScore || 0, streak: d.newStreak || 0,
        progress: d.progress || 0, finished: (currentQIdx + 1) >= totalQ,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
    }
  });
}

function timeOut() {
  if (answered) return;
  answered = true;
  stopTimer();
  disableAnswerArea();
  el('q-body').innerHTML =
    '<div class="answered-msg">' +
    '<span class="big">&#x23F1;</span>' +
    "Time's up! Waiting for the result&hellip;" +
    '</div>';
  gasPost({
    action: 'validateKahootAnswer', sessionId: sessionId, playerId: playerId,
    qIndex: currentQIdx, answer: '', timeRemaining: 0, currentStreak: streak
  }, function (err, res) {
    if (!err && res && res.status === 'success') {
      streak = 0;
      correctAnswer = { isCorrect: false, points: 0, streak: 0, total: res.data.totalScore || totalScore };
    }
  });
}

function disableAnswerArea() {
  var btns = el('q-body').querySelectorAll('button, input');
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
}

/* ─────────────────────────────────────────────
   REVEAL
───────────────────────────────────────────── */
function showReveal(qi, serverCorrect) {
  stopTimer();
  clearTimeout(roundTimeout);
  var q   = questions[qi] || questions[currentQIdx];
  if (!q) return;

  /* Host broadcasts correct answer in Firebase state.correctAnswer */
  var correct = serverCorrect || '';

  el('reveal-q-txt').textContent = q.question;

  /* Rebuild options with correct/wrong styling */
  var optsWrap = el('reveal-opts');
  optsWrap.innerHTML = '';
  if (q.type === 'MCQ' || q.type === 'TF') {
    (q.options || []).forEach(function (opt, i) {
      var isCorrect = opt.toLowerCase() === correct.toLowerCase() || String.fromCharCode(65+i) === correct.toUpperCase();
      var div = document.createElement('div');
      div.className = 'reveal-opt ' + (isCorrect ? 'correct' : 'wrong');
      div.innerHTML = '<div class="reveal-opt-shape">' + SHAPES[i%4] + '</div><span>' + esc(opt) + '</span>';
      optsWrap.appendChild(div);
    });
  }

  /* Score popup */
  var stat = el('reveal-stat');
  if (correctAnswer) {
    var isC = correctAnswer.isCorrect;
    stat.innerHTML =
      '<div class="rs-your">' + (isC ? 'Correct!' : 'Wrong') + '</div>' +
      '<div class="rs-pts ' + (isC ? 'correct' : 'wrong') + '">' +
        (isC ? '+' + correctAnswer.points : '0') +
      '</div>' +
      (isC && correctAnswer.streak > 1 ? '<div class="rs-streak">&#x1F525; ' + correctAnswer.streak + ' in a row!</div>' : '');
  } else {
    stat.innerHTML = '<div class="rs-your" style="color:#f87171">No answer submitted</div>';
  }

  show('s-reveal');
}

/* ─────────────────────────────────────────────
   LEADERBOARD (between rounds)
───────────────────────────────────────────── */
function showLeaderboard(autoAdvanceAt) {
  playersRef.once('value', function (snap) {
    var players = (snap && snap.val()) || {};
    var sorted  = Object.entries(players).sort(function (a, b) {
      return (b[1].score || 0) - (a[1].score || 0);
    });
    var medals = ['&#x1F947;','&#x1F948;','&#x1F949;'];
    var list   = el('lb-list');
    list.innerHTML = sorted.slice(0, 10).map(function (entry, i) {
      var pid = entry[0]; var p = entry[1];
      var isMe = pid === playerId;
      return '<div class="lb-row' + (isMe ? ' lb-me' : '') + '" style="animation-delay:' + (i * 60) + 'ms">' +
        '<div class="lb-rank">' + (medals[i] || (i + 1)) + '</div>' +
        '<div class="lb-name">' + esc(p.name) + (p.finished ? ' &#x1F3C1;' : '') + '</div>' +
        '<div class="lb-score">' + ((p.score || 0).toLocaleString()) + '</div>' +
        (p.streak > 2 ? '<div class="lb-streak">&#x1F525;' + p.streak + '</div>' : '') +
        '</div>';
    }).join('');
    show('s-leaderboard');

    /* Countdown to next question if host set autoAdvanceAt */
    if (autoAdvanceAt) {
      var countdown = Math.max(1, Math.ceil((autoAdvanceAt - Date.now()) / 1000));
      var iv2 = setInterval(function () {
        countdown--;
        el('lb-next-auto').textContent = countdown > 0 ? 'Next question in ' + countdown + 's' : 'Loading\u2026';
        if (countdown <= 0) clearInterval(iv2);
      }, 1000);
      el('lb-next-auto').textContent = 'Next question in ' + countdown + 's';
    } else {
      el('lb-next-auto').textContent = 'Waiting for the teacher\u2026';
    }
  });
}

/* ─────────────────────────────────────────────
   FINAL SCREEN
───────────────────────────────────────────── */
function showFinal() {
  stopTimer();
  clearTimeout(roundTimeout);
  playersRef.once('value', function (snap) {
    var players = (snap && snap.val()) || {};
    var sorted  = Object.entries(players).sort(function (a, b) {
      return (b[1].score || 0) - (a[1].score || 0);
    });

    /* Podium (top 3) */
    var podiumOrder = [1, 0, 2]; /* silver, gold, bronze left-to-right */
    var podium = el('final-podium');
    podium.innerHTML = '';
    var pClasses = ['p2','p1','p3'];
    podiumOrder.forEach(function (rank, slot) {
      var entry = sorted[rank];
      if (!entry) return;
      var p   = entry[1];
      var div = document.createElement('div');
      div.className = 'podium-slot ' + pClasses[slot];
      var init = (p.name || '?').slice(0,2).toUpperCase();
      div.innerHTML =
        '<div class="podium-avatar">' + init + '</div>' +
        '<div class="podium-name">' + esc(p.name) + '</div>' +
        '<div class="podium-score">' + ((p.score||0).toLocaleString()) + '</div>' +
        '<div class="podium-bar"></div>';
      podium.appendChild(div);
    });

    /* My rank */
    var myRank = sorted.findIndex(function (e) { return e[0] === playerId; });
    var myScore = sorted[myRank] ? (sorted[myRank][1].score || 0) : totalScore;
    var rankStr = myRank === 0 ? '1st place' : myRank === 1 ? '2nd place' : myRank === 2 ? '3rd place' : (myRank + 1) + 'th place';
    el('final-rank-badge').textContent = 'You finished in ' + rankStr + ' out of ' + sorted.length + ' players';
    el('final-score-big').textContent  = myScore.toLocaleString();
    show('s-final');
  });
}

/* ─────────────────────────────────────────────
   CLEANUP
───────────────────────────────────────────── */
window.addEventListener('beforeunload', function () {
  stopTimer(); clearTimeout(roundTimeout);
  if (stateRef)   { try { stateRef.off('value');    } catch (_) {} }
  if (playersRef) { try { playersRef.off('value');  } catch (_) {} }
  if (lobbyPRef)  { try { lobbyPRef.off('value');   } catch (_) {} }
  if (playerId && sessionId) {
    db.ref('kahoot/' + sessionId + '/players/' + playerId + '/online').set(false);
  }
});

}());
</script>
</body>
</html>
