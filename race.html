<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizFlow Pro — Live Exam Race</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --track: #334155;
      --text: #f8fafc; --accent: #3b82f6; --success: #22c55e; --danger: #ef4444;
      --gold: #f59e0b; --font: system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 20px; display: flex; align-items: center; justify-content: center;
    }
    .container { max-width: 900px; width: 100%; }
    #fatal-error { display:none; text-align:center; padding:40px 20px; }
    #fatal-error h2 { color:var(--danger); font-size:22px; margin-bottom:12px; }
    #fatal-error p  { color:#94a3b8; font-size:14px; line-height:1.6; }
    #login { text-align: center; padding: 40px 20px; }
    #login h1 { font-size: 28px; margin-bottom: 8px; color: var(--accent); }
    #login .subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
    #login input {
      padding: 14px; border: 2px solid var(--accent); background: var(--panel);
      color: var(--text); border-radius: 10px; font-size: 16px; width: 280px;
      display: block; margin: 8px auto; outline: none; font-family: var(--font);
    }
    #login input:focus { border-color: #60a5fa; }
    #joinBtn {
      padding: 14px 36px; background: var(--accent); color: white; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px;
      transition: transform 0.15s, background 0.15s; font-family: var(--font); display: inline-block;
    }
    #joinBtn:hover { background: #2563eb; transform: translateY(-2px); }
    #joinBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .hint { font-size: 12px; color: #64748b; margin-top: 10px; }
    .error-msg { color: var(--danger); margin-top: 12px; font-size: 14px; min-height: 18px; }
    #game { display: none; }
    .game-hdr { text-align:center; margin-bottom:20px; }
    .game-hdr h2 { font-size:22px; margin-bottom:4px; }
    .game-status { color:#94a3b8; font-size:14px; text-align:center; margin-bottom:16px; }
    .track-container { background:var(--panel); border-radius:12px; padding:20px; margin-bottom:24px; position:relative; overflow:hidden; border:1px solid var(--track); min-height:60px; }
    .finish-line { position:absolute; right:30px; top:0; bottom:0; width:4px; background:repeating-linear-gradient(45deg,var(--gold),var(--gold) 6px,transparent 6px,transparent 12px); border-radius:2px; }
    .lane { display:flex; align-items:center; height:48px; border-bottom:1px dashed var(--track); position:relative; }
    .player-name { position:absolute; left:0; font-size:11px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:90px; }
    .stickman { position:absolute; transition:left .7s cubic-bezier(.34,1.56,.64,1); display:flex; flex-direction:column; align-items:center; pointer-events:none; }
    .stickman .head { width:11px; height:11px; border-radius:50%; background:currentColor; }
    .stickman .body { width:3px; height:15px; background:currentColor; margin:2px 0; }
    .stickman .legs { width:16px; height:9px; border-top:3px solid currentColor; border-radius:0 0 8px 8px; margin-top:1px; }
    .stickman.running .legs { animation:walk .5s infinite alternate; }
    @keyframes walk { 0%{transform:scaleX(1)} 100%{transform:scaleX(.75)} }
    .leaderboard { background:var(--panel); border-radius:12px; padding:20px; border:1px solid var(--track); margin-bottom:20px; }
    .lb-title { font-size:18px; font-weight:700; margin-bottom:16px; text-align:center; }
    .lb-list { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
    .lb-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--track); border-radius:10px; }
    .lb-row:nth-child(1) { background:linear-gradient(90deg,rgba(245,158,11,.2),transparent); border:1px solid var(--gold); }
    .lb-row:nth-child(2) { background:linear-gradient(90deg,rgba(156,163,175,.2),transparent); }
    .lb-row:nth-child(3) { background:linear-gradient(90deg,rgba(234,179,8,.15),transparent); }
    .lb-rank { font-weight:700; width:28px; text-align:center; }
    .lb-name { flex:1; font-size:14px; margin-left:10px; }
    .lb-score { font-weight:700; color:var(--success); font-size:13px; }
    .lb-pct   { color:#94a3b8; font-size:12px; }
    .question-card { background:var(--panel); border-radius:12px; padding:24px; border:1px solid var(--track); margin-bottom:20px; }
    .question-text { font-size:18px; font-weight:600; margin-bottom:16px; line-height:1.4; }
    .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .opt-btn { padding:14px; background:var(--track); color:var(--text); border:2px solid transparent; border-radius:10px; cursor:pointer; font-size:15px; text-align:left; transition:border-color .15s,background .15s; font-family:var(--font); }
    .opt-btn:hover:not(:disabled) { border-color:var(--accent); }
    .opt-btn:disabled { opacity:.6; cursor:not-allowed; }
    .opt-btn.correct { background:var(--success); border-color:#16a34a; }
    .opt-btn.wrong   { background:var(--danger);  border-color:#dc2626; }
    .short-input { width:100%; padding:14px; background:var(--track); border:2px solid var(--track); border-radius:10px; color:var(--text); font-size:16px; margin-bottom:12px; font-family:var(--font); outline:none; }
    .short-input:focus { border-color:var(--accent); }
    .submit-btn { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; font-family:var(--font); }
    .submit-btn:hover:not(:disabled) { background:#2563eb; }
    .submit-btn:disabled { opacity:.5; cursor:not-allowed; }
    .score-popup { position:fixed; top:38%; left:50%; transform:translateX(-50%); font-size:32px; font-weight:900; pointer-events:none; z-index:100; text-shadow:0 2px 8px rgba(0,0,0,.5); animation:popUp 1s forwards; }
    @keyframes popUp { 0%{opacity:0;transform:translateX(-50%) scale(.6)} 20%{opacity:1;transform:translateX(-50%) scale(1.1)} 100%{opacity:0;transform:translateX(-50%) translateY(-36px) scale(1)} }
    @media(max-width:600px){ .options{grid-template-columns:1fr} #login input{width:100%;max-width:300px} .player-name{max-width:70px} }
  </style>
</head>
<body>
<div class="container">

  <div id="fatal-error">
    <h2>⚠️ Cannot Start</h2>
    <p id="fatal-msg">Please open this page using the link your teacher provided.</p>
  </div>

  <div id="login">
    <h1>🏁 Live Exam Race</h1>
    <p class="subtitle">Enter your race code and name to join</p>
    <input type="text" id="inp-code" placeholder="Race Code (e.g. ABC123)"
           maxlength="8" autocomplete="off" spellcheck="false"
           style="text-transform:uppercase;letter-spacing:3px;font-family:monospace;">
    <input type="text" id="inp-name" placeholder="Your Name" maxlength="20" autocomplete="off">
    <br>
    <button id="joinBtn">Join Race 🏁</button>
    <p class="hint">Get the race code from your teacher's screen</p>
    <p id="joinError" class="error-msg"></p>
  </div>

  <div id="game">
    <div class="game-hdr">
      <h2 id="gameTitle">Race in Progress</h2>
    </div>
    <div class="game-status" id="gameStatus">Answer questions to move forward!</div>
    <div class="track-container" id="track"><div class="finish-line"></div></div>
    <div class="leaderboard">
      <div class="lb-title">🏆 Live Leaderboard</div>
      <div class="lb-list" id="lbList"></div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="question-text" id="questionText">Loading...</div>
      <div id="answerArea"></div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
(function () {
  'use strict';

  /* 1 ── URL params */
  var params     = new URLSearchParams(window.location.search);
  var GAS_URL    = (params.get('script') || '').trim();
  var presetRoom = (params.get('room')   || '').trim().toUpperCase();

  /* 2 ── Fatal helper */
  function fatal(msg) {
    document.getElementById('login').style.display       = 'none';
    document.getElementById('game').style.display        = 'none';
    document.getElementById('fatal-error').style.display = 'block';
    document.getElementById('fatal-msg').textContent     = msg;
    console.error('[Race]', msg);
  }

  /* 3 ── Need GAS_URL */
  if (!GAS_URL) {
    document.addEventListener('DOMContentLoaded', function () {
      fatal('Missing ?script= URL. Please open this page using the link your teacher shared.');
    });
    return;
  }

  /* 4 ── Firebase init */
  var db;
  try {
    var cfg = {
      apiKey:            'AIzaSyDpKPol5g5iZQpi6zw5aODpNH4MzejOBfw',
      authDomain:        'examrace-31854.firebaseapp.com',
      databaseURL:       'https://examrace-31854-default-rtdb.firebaseio.com',
      projectId:         'examrace-31854',
      storageBucket:     'examrace-31854.firebasestorage.app',
      messagingSenderId: '698483423316',
      appId:             '1:698483423316:web:d5dd780bb186d8253115c1'
    };
    var app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(cfg);
    db = firebase.database(app);
  } catch (e) {
    document.addEventListener('DOMContentLoaded', function () {
      fatal('Firebase error: ' + e.message);
    });
    return;
  }

  /* 5 ── State */
  var raceId = '', playerId = '', playerName = '', playerColor = '';
  var questions = [], currentQIndex = 0, totalQuestions = 0;
  var correctCount = 0, gameUnsub = null;

  /* 6 ── DOM wiring */
  document.addEventListener('DOMContentLoaded', function () {
    if (presetRoom) document.getElementById('inp-code').value = presetRoom;

    document.getElementById('inp-code').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('inp-name').focus();
    });
    document.getElementById('inp-name').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') joinRace();
    });
    document.getElementById('joinBtn').addEventListener('click', joinRace);
  });

  /* 7 ── Join */
  function joinRace() {
    var codeEl  = document.getElementById('inp-code');
    var nameEl  = document.getElementById('inp-name');
    var errorEl = document.getElementById('joinError');
    var btn     = document.getElementById('joinBtn');

    raceId     = (codeEl.value || '').trim().toUpperCase();
    playerName = (nameEl.value || '').trim();
    errorEl.textContent = '';

    if (raceId.length < 6)    { errorEl.textContent = 'Enter a valid race code (6–8 characters)'; return; }
    if (playerName.length < 2){ errorEl.textContent = 'Enter your name (at least 2 characters)'; return; }

    btn.disabled = true; btn.textContent = 'Joining...';
    playerId    = 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    playerColor = '#' + (Math.floor(Math.random() * 0x999999) + 0x444444).toString(16).slice(-6);

    /* KEY FIX: field is raceId (matches Code.gs getRaceQuestions) */
    gasPost({ action: 'getRaceQuestions', raceId: raceId }, function (err, res) {
      if (err || !res || res.status !== 'success') {
        errorEl.textContent = (res && res.message) || 'Race not found. Check your code.';
        btn.disabled = false; btn.textContent = 'Join Race 🏁';
        return;
      }
      questions      = res.data || [];
      totalQuestions = questions.length;

      document.getElementById('login').style.display = 'none';
      document.getElementById('game').style.display  = 'block';
      document.getElementById('gameTitle').textContent = 'Race: ' + raceId;

      registerPlayer();
      initSync();
      loadQuestion();
    });
  }

  /* 8 ── Firebase */
  function registerPlayer() {
    db.ref('race/' + raceId + '/players/' + playerId).set({
      name: playerName, color: playerColor,
      progress: 0, correct: 0, finished: false, finishTime: null,
      joinedAt: firebase.database.ServerValue.TIMESTAMP,
      updatedAt: firebase.database.ServerValue.TIMESTAMP
    });
  }
  function initSync() {
    gameUnsub = db.ref('race/' + raceId + '/players').on('value', function (s) {
      var players = s.val() || {};
      renderTrack(players);
      renderLeaderboard(players);
    });
  }

  /* 9 ── Question */
  function loadQuestion() {
    var card = document.getElementById('questionCard');
    var qTxt = document.getElementById('questionText');
    var area = document.getElementById('answerArea');

    if (currentQIndex >= totalQuestions) {
      card.innerHTML = '<div style="text-align:center"><h3 style="color:var(--success)">✅ Race Complete!</h3><p style="color:#94a3b8;margin-top:8px">Check the leaderboard for final standings.</p></div>';
      return;
    }

    var q = questions[currentQIndex];
    qTxt.textContent = 'Q' + (currentQIndex + 1) + '/' + totalQuestions + ': ' + q.question;
    area.innerHTML   = '';

    if (q.type === 'MCQ' || q.type === 'TF') {
      area.className = 'options';
      (q.options || []).forEach(function (opt) {
        var b = document.createElement('button');
        b.className = 'opt-btn'; b.textContent = opt;
        b.addEventListener('click', (function (o, el) {
          return function () { submitAnswer(o, el); };
        })(opt, b));
        area.appendChild(b);
      });
    } else {
      area.className = '';
      var inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'short-input';
      inp.placeholder = 'Type your answer...'; inp.maxLength = 120;
      var sb  = document.createElement('button');
      sb.className = 'submit-btn'; sb.textContent = 'Submit Answer';
      sb.addEventListener('click', function () { if (inp.value.trim()) submitAnswer(inp.value.trim(), null); });
      inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') sb.click(); });
      area.appendChild(inp); area.appendChild(sb);
      setTimeout(function () { inp.focus(); }, 80);
    }
  }

  /* 10 ── Submit */
  function submitAnswer(answer, btnEl) {
    var inputs = document.querySelectorAll('#answerArea button, #answerArea input');
    for (var i = 0; i < inputs.length; i++) inputs[i].disabled = true;
    document.getElementById('gameStatus').textContent = 'Checking...';

    /* KEY FIX: raceId + questionId fields match Code.gs validateRaceAnswer */
    gasPost({
      action:     'validateRaceAnswer',
      raceId:     raceId,
      playerId:   playerId,
      questionId: questions[currentQIndex].id,
      answer:     answer
    }, function (err, res) {
      if (err || !res || res.status !== 'success') {
        popup('⚠️ Error', '#f59e0b');
        for (var i = 0; i < inputs.length; i++) inputs[i].disabled = false;
        document.getElementById('gameStatus').textContent = 'Answer questions to move forward!';
        return;
      }
      var d = res.data;
      if (btnEl) btnEl.classList.add(d.isCorrect ? 'correct' : 'wrong');
      popup(d.isCorrect ? '+' + d.correctCount + ' ✓' : '✗', d.isCorrect ? '#22c55e' : '#ef4444');
      if (d.isCorrect) correctCount++;

      db.ref('race/' + raceId + '/players/' + playerId).update({
        progress:  d.progress    || 0,
        correct:   d.correctCount || 0,
        finished:  d.finished    || false,
        finishTime:d.finished ? firebase.database.ServerValue.TIMESTAMP : null,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });

      currentQIndex++;
      setTimeout(function () {
        document.getElementById('gameStatus').textContent = 'Answer questions to move forward!';
        loadQuestion();
      }, 900);
    });
  }

  /* 11 ── Track render */
  function renderTrack(players) {
    var track = document.getElementById('track');
    track.innerHTML = '<div class="finish-line"></div>';
    var arr = [];
    for (var id in players) { if (players.hasOwnProperty(id)) arr.push(players[id]); }
    arr.sort(function (a, b) { return (b.progress || 0) - (a.progress || 0); });
    arr.forEach(function (p) {
      var pct  = Math.min((p.progress || 0) * 86, 86);
      var lane = document.createElement('div');
      lane.className = 'lane';
      lane.innerHTML =
        '<span class="player-name" style="color:' + p.color + '">' + esc(p.name) + '</span>' +
        '<div class="stickman ' + (p.finished ? '' : 'running') + '" ' +
        'style="left:calc(8px + ' + pct + '%);color:' + p.color + '">' +
        '<div class="head"></div><div class="body"></div><div class="legs"></div></div>';
      track.appendChild(lane);
    });
  }

  /* 12 ── Leaderboard render */
  function renderLeaderboard(players) {
    var arr = [];
    for (var id in players) { if (players.hasOwnProperty(id)) arr.push(players[id]); }
    arr.sort(function (a, b) {
      if ((b.correct || 0) !== (a.correct || 0)) return (b.correct || 0) - (a.correct || 0);
      return (b.progress || 0) - (a.progress || 0);
    });
    var medals = ['🥇','🥈','🥉'];
    document.getElementById('lbList').innerHTML = arr.length ? arr.slice(0, 10).map(function (p, i) {
      var pct = Math.round((p.progress || 0) * 100);
      var status = p.finished ? '🏁 Done' : (pct > 0 ? '🏃 ' + pct + '%' : '⏳');
      return '<div class="lb-row">' +
        '<div class="lb-rank">' + (medals[i] || (i + 1)) + '</div>' +
        '<div class="lb-name">' + esc(p.name) + '</div>' +
        '<div><div class="lb-score">' + (p.correct || 0) + '/' + totalQuestions + '</div>' +
        '<div class="lb-pct">' + status + '</div></div></div>';
    }).join('') : '<div style="text-align:center;color:#64748b;padding:10px;font-size:13px">Waiting for players...</div>';
  }

  /* 13 ── Helpers */
  function popup(text, color) {
    var old = document.getElementById('_pop');
    if (old) old.parentNode.removeChild(old);
    var el = document.createElement('div');
    el.id = '_pop'; el.className = 'score-popup';
    el.style.color = color; el.textContent = text;
    document.body.appendChild(el);
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 1100);
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function gasPost(body, cb) {
    fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(d){ cb(null,d); })
      .catch(function(e){ console.error('[gasPost]',e); cb(e,null); });
  }

  window.addEventListener('beforeunload', function () { if (gameUnsub) gameUnsub(); });

}());
</script>
</body>
</html>
