<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuizFlow Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #FF3355; --red-dark: #CC2944;
      --blue: #45A3E5; --blue-dark: #3782B7;
      --yellow: #FFC00A; --yellow-dark: #CC9908;
      --green: #66BF39; --green-dark: #52992E;
      --bg: #46178F; --bg-dark: #2E0E5C;
      --surface: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Nunito', sans-serif; }
    body { background: var(--bg); color: var(--surface); min-height: 100vh; min-height: 100dvh; overflow: hidden; }
    .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; position: relative; }
    .screen.on { display: flex; }
    
    /* JOIN */
    #s-join { align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, var(--bg) 0%, var(--bg-dark) 100%); }
    .join-wrap { width: 100%; max-width: 400px; }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-icon { display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; background: linear-gradient(135deg, var(--yellow), #FFD93D); border-radius: 24px; font-size: 40px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(255, 192, 10, 0.3); }
    .brand h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .brand p { font-size: 16px; opacity: 0.8; font-weight: 600; }
    .join-card { background: var(--surface); border-radius: 20px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .join-card h2 { font-size: 24px; font-weight: 800; color: #333; margin-bottom: 8px; }
    .join-card p { font-size: 14px; color: #666; margin-bottom: 24px; }
    .fg { margin-bottom: 20px; }
    .fg label { display: block; font-size: 12px; font-weight: 800; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .fg input { width: 100%; padding: 16px; background: #F5F5F5; border: 3px solid transparent; border-radius: 12px; color: #333; font-size: 18px; font-weight: 700; outline: none; transition: all 0.2s; }
    .fg input:focus { border-color: var(--blue); background: #FFF; transform: translateY(-2px); }
    .code-input { font-size: 32px !important; font-weight: 900 !important; text-align: center; letter-spacing: 8px; text-transform: uppercase; color: var(--blue) !important; }
    .btn-primary { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--green), var(--green-dark)); border: none; border-radius: 12px; color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .err { display: none; margin-top: 16px; padding: 12px 16px; background: rgba(255, 51, 85, 0.1); border-left: 4px solid var(--red); border-radius: 8px; font-size: 14px; color: var(--red); font-weight: 600; }
    .err.on { display: block; }
    .spin { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    
    /* LOBBY */
    #s-lobby { align-items: center; justify-content: center; padding: 32px; text-align: center; }
    .lobby-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 24px; }
    .lobby-name { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .lobby-room { display: inline-block; font-size: 48px; font-weight: 900; color: var(--yellow); letter-spacing: 12px; background: rgba(255,255,255,0.1); padding: 16px 32px; border-radius: 16px; margin-bottom: 24px; }
    .lobby-status { font-size: 18px; opacity: 0.9; margin-bottom: 32px; }
    .lobby-counter { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 24px 48px; }
    .lobby-count { font-size: 64px; font-weight: 900; color: var(--green); line-height: 1; }
    .waiting { display: flex; gap: 12px; justify-content: center; margin-top: 32px; }
    .waiting span { width: 16px; height: 16px; border-radius: 50%; background: #fff; animation: bounce 1.4s ease-in-out infinite; }
    .waiting span:nth-child(2) { animation-delay: 0.2s; }
    .waiting span:nth-child(3) { animation-delay: 0.4s; }
    
    /* QUESTION */
    #s-question { flex-direction: column; }
    .q-header { background: rgba(0,0,0,0.2); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .q-info { display: flex; align-items: center; gap: 16px; }
    .q-badge { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 800; }
    .q-score { font-size: 20px; font-weight: 800; }
    .q-timer-wrap { position: relative; width: 60px; height: 60px; }
    .q-timer-svg { transform: rotate(-90deg); width: 60px; height: 60px; }
    .timer-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 6; }
    .timer-fill { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.1s; }
    .timer-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; }
    .q-content { flex: 1; display: flex; flex-direction: column; padding: 24px; }
    .q-card { background: var(--surface); border-radius: 20px; padding: 32px; margin-bottom: 24px; color: #333; }
    .q-type { display: inline-block; padding: 6px 12px; background: var(--bg); color: #fff; border-radius: 20px; font-size: 12px; font-weight: 800; margin-bottom: 16px; }
    .q-text { font-size: 26px; font-weight: 800; line-height: 1.4; }
    .answers { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; flex: 1; }
    .ans-btn { border: none; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; font-size: 18px; font-weight: 800; color: #fff; border-bottom: 6px solid rgba(0,0,0,0.2); transition: all 0.1s; }
    .ans-btn:active:not(:disabled) { transform: scale(0.98); border-bottom-width: 3px; margin-top: 3px; }
    .ans-btn:disabled { opacity: 0.5; }
    .ans-btn.sel { transform: scale(1.05); box-shadow: 0 0 0 6px #fff; z-index: 10; }
    .ans-btn.red { background: var(--red); border-color: var(--red-dark); }
    .ans-btn.blue { background: var(--blue); border-color: var(--blue-dark); }
    .ans-btn.yellow { background: var(--yellow); border-color: var(--yellow-dark); color: #333; }
    .ans-btn.green { background: var(--green); border-color: var(--green-dark); }
    .ans-shape { font-size: 40px; }
    .ans-letter { font-size: 14px; opacity: 0.9; }
    .tf { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; }
    .tf-btn { border: none; border-radius: 20px; font-size: 32px; font-weight: 900; color: #fff; border-bottom: 8px solid rgba(0,0,0,0.2); cursor: pointer; }
    .tf-btn.t { background: var(--green); border-color: var(--green-dark); }
    .tf-btn.f { background: var(--red); border-color: var(--red-dark); }
    .short { flex: 1; display: flex; flex-direction: column; gap: 16px; }
    .short input { flex: 1; padding: 24px; font-size: 24px; font-weight: 700; border: 4px solid rgba(255,255,255,0.3); border-radius: 16px; background: rgba(255,255,255,0.1); color: #fff; text-align: center; }
    .short button { padding: 20px; background: var(--yellow); color: #333; border: none; border-radius: 16px; font-size: 20px; font-weight: 800; border-bottom: 6px solid var(--yellow-dark); cursor: pointer; }
    .locked { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 64px; animation: popIn 0.3s; }
    
    /* FEEDBACK */
    #s-feedback { align-items: center; justify-content: center; padding: 32px; text-align: center; }
    .fb-icon { width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; margin: 0 auto 32px; animation: popIn 0.5s; }
    .fb-icon.ok { background: var(--green); }
    .fb-icon.bad { background: var(--red); }
    .fb-icon.time { background: var(--yellow); }
    .fb-title { font-size: 48px; font-weight: 900; margin-bottom: 16px; }
    .fb-points { font-size: 72px; font-weight: 900; color: var(--yellow); animation: bounce 0.6s; }
    
    /* LEADERBOARD */
    #s-leaderboard { padding: 24px; overflow-y: auto; }
    .lb-title { text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 24px; }
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 32px; height: 180px; }
    .pod-place { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .pod-av { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 8px; }
    .pod-place:nth-child(1) .pod-av { width: 80px; height: 80px; font-size: 36px; background: gold; box-shadow: 0 0 30px rgba(255,215,0,0.5); }
    .pod-place:nth-child(2) .pod-av { background: silver; }
    .pod-place:nth-child(3) .pod-av { background: #CD7F32; }
    .pod-name { font-size: 14px; font-weight: 700; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
    .pod-score { font-size: 18px; font-weight: 900; color: var(--yellow); }
    .pod-block { width: 80px; border-radius: 8px 8px 0 0; margin-top: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
    .pod-place:nth-child(1) .pod-block { height: 100px; background: linear-gradient(180deg, #FFD700, #FFA500); }
    .pod-place:nth-child(2) .pod-block { height: 70px; background: linear-gradient(180deg, #E8E8E8, #A8A8A8); }
    .pod-place:nth-child(3) .pod-block { height: 50px; background: linear-gradient(180deg, #CD7F32, #8B4513); }
    .lb-list { display: flex; flex-direction: column; gap: 8px; max-width: 600px; margin: 0 auto; }
    .lb-row { display: flex; align-items: center; gap: 16px; padding: 16px; background: rgba(255,255,255,0.1); border-radius: 12px; }
    .lb-row.me { background: rgba(255,255,255,0.2); border: 2px solid var(--yellow); }
    .lb-rank { width: 40px; text-align: center; font-size: 20px; font-weight: 800; }
    .lb-av { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; }
    .lb-name { flex: 1; font-size: 16px; font-weight: 700; }
    .lb-name span { font-size: 12px; color: var(--yellow); margin-left: 8px; }
    .lb-score { font-size: 20px; font-weight: 900; color: var(--yellow); }
    .next-t { text-align: center; margin-top: 24px; padding: 24px; background: rgba(255,255,255,0.1); border-radius: 16px; }
    .next-t div:first-child { font-size: 14px; opacity: 0.8; margin-bottom: 8px; }
    .next-t div:last-child { font-size: 48px; font-weight: 900; color: var(--yellow); }
    
    /* ENDED */
    #s-ended { align-items: center; justify-content: center; padding: 32px; text-align: center; }
    .end-trophy { font-size: 120px; margin-bottom: 24px; animation: bounce 1s infinite; }
    .end-title { font-size: 48px; font-weight: 900; margin-bottom: 8px; }
    .end-rank { font-size: 24px; color: var(--yellow); margin-bottom: 32px; }
    .end-score { background: rgba(255,255,255,0.1); border-radius: 24px; padding: 32px; margin-bottom: 32px; }
    .end-score div:first-child { font-size: 16px; opacity: 0.8; margin-bottom: 8px; }
    .end-score div:last-child { font-size: 72px; font-weight: 900; color: var(--yellow); }
    
    /* CONNECTION OVERLAY */
    .conn-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .conn-overlay.on { display: flex; }
    .conn-overlay .spin { width: 40px; height: 40px; border-width: 4px; margin-bottom: 16px; }
    .conn-overlay div { font-size: 18px; font-weight: 700; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @media (max-width: 480px) { .q-text { font-size: 20px; } .ans-shape { font-size: 32px; } }
  </style>
</head>
<body>

<div class="conn-overlay" id="conn-overlay">
  <span class="spin"></span>
  <div>Reconnecting...</div>
</div>

<div class="screen on" id="s-join">
  <div class="join-wrap">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h1>QuizFlow Live</h1>
      <p>Enter the game PIN from your teacher</p>
    </div>
    <div class="join-card">
      <h2>Join Game</h2>
      <div class="fg">
        <label>Game PIN</label>
        <input type="text" id="inp-code" class="code-input" placeholder="123456" maxlength="6" 
          oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
          onkeydown="if(event.key==='Enter') document.getElementById('inp-name').focus()">
      </div>
      <div class="fg">
        <label>Nickname</label>
        <input type="text" id="inp-name" placeholder="Your name" maxlength="20"
          onkeydown="if(event.key==='Enter') doJoin()">
      </div>
      <button class="btn-primary" id="btn-join" onclick="doJoin()">Enter</button>
      <div class="err" id="join-err"></div>
    </div>
  </div>
</div>

<div class="screen" id="s-lobby">
  <div class="lobby-avatar" id="lobby-av">👤</div>
  <div class="lobby-name" id="lobby-name">Player</div>
  <div class="lobby-room" id="lobby-room">------</div>
  <div class="lobby-status">Waiting for host to start...</div>
  <div class="lobby-counter">
    <div class="lobby-count" id="lobby-count">1</div>
    <div style="opacity:0.8">players</div>
  </div>
  <div class="waiting"><span></span><span></span><span></span></div>
</div>

<div class="screen" id="s-question">
  <div class="q-header">
    <div class="q-info">
      <div class="q-badge" id="q-num">Q1</div>
      <div class="q-score" id="q-score">0</div>
    </div>
    <div class="q-timer-wrap">
      <svg class="q-timer-svg" viewBox="0 0 60 60">
        <circle class="timer-bg" cx="30" cy="30" r="27"/>
        <circle class="timer-fill" id="timer-ring" cx="30" cy="30" r="27" stroke-dasharray="169.65" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="q-timer">20</div>
    </div>
  </div>
  <div class="q-content">
    <div class="q-card">
      <div class="q-type" id="q-type">QUESTION</div>
      <div class="q-text" id="q-text">Loading...</div>
    </div>
    <div id="answers-box"></div>
  </div>
</div>

<div class="screen" id="s-feedback">
  <div class="fb-icon" id="fb-icon">✓</div>
  <div class="fb-title" id="fb-title">Correct!</div>
  <div class="fb-points" id="fb-points">+0</div>
</div>

<div class="screen" id="s-leaderboard">
  <div class="lb-title">Leaderboard</div>
  <div class="podium" id="podium"></div>
  <div class="lb-list" id="lb-list"></div>
  <div class="next-t" id="next-timer">
    <div>Next question in</div>
    <div id="next-count">5</div>
  </div>
</div>

<div class="screen" id="s-ended">
  <div class="end-trophy" id="end-trophy">🏆</div>
  <div class="end-title" id="end-title">Game Over!</div>
  <div class="end-rank" id="end-rank">You finished #1</div>
  <div class="end-score">
    <div>Final Score</div>
    <div id="end-score">0</div>
  </div>
</div>

<script>
// CONFIG
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5E2jZQRYJMCE3fA1TO2uwqEiloviT1eiz8SbrMsZLTDa4H8cHdyWBgxhRCFrfWJv4zQ/exec';

// STATE
var state = {
  playerId: '', name: '', roomCode: '', score: 0, correct: 0, streak: 0, totalQ: 0, currentQ: -1,
  serverOffset: 0, lastState: null, answered: false
};

var pollTimer = null, syncTimer = null, countdownTimer = null;
var lastPollTime = 0;
var isReconnecting = false;

// INIT
window.onload = function() {
  var m = location.search.match(/room=([A-Z0-9]{6})/i);
  if (m) document.getElementById('inp-code').value = m[1].toUpperCase();
};

// NETWORK - Robust with retry
function post(action, data, callback) {
  var url = SCRIPT_URL;
  var payload = JSON.stringify(Object.assign({action: action}, data));
  var attempts = 0;
  var maxAttempts = 3;
  
  function tryRequest() {
    attempts++;
    var xhr = new XMLHttpRequest();
    xhr.timeout = 10000; // 10 second timeout
    
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          try {
            var resp = JSON.parse(xhr.responseText);
            isReconnecting = false;
            hideConnOverlay();
            if (callback) callback(null, resp);
          } catch(e) {
            if (callback) callback(e, null);
          }
        } else {
          if (attempts < maxAttempts) {
            setTimeout(tryRequest, 1000 * attempts); // Exponential backoff
          } else {
            isReconnecting = true;
            showConnOverlay();
            if (callback) callback(new Error('Failed after ' + maxAttempts + ' attempts'), null);
            // Auto-retry polling
            setTimeout(function() { if (state.roomCode) doPoll(); }, 2000);
          }
        }
      }
    };
    
    xhr.onerror = function() {
      if (attempts < maxAttempts) {
        setTimeout(tryRequest, 1000 * attempts);
      } else {
        isReconnecting = true;
        showConnOverlay();
        setTimeout(function() { if (state.roomCode) doPoll(); }, 2000);
      }
    };
    
    xhr.ontimeout = function() {
      if (attempts < maxAttempts) {
        setTimeout(tryRequest, 1000 * attempts);
      } else {
        if (callback) callback(new Error('Timeout'), null);
      }
    };
    
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(payload);
  }
  
  tryRequest();
}

function showConnOverlay() {
  document.getElementById('conn-overlay').classList.add('on');
}

function hideConnOverlay() {
  document.getElementById('conn-overlay').classList.remove('on');
}

// JOIN
function doJoin() {
  var code = document.getElementById('inp-code').value.trim().toUpperCase();
  var name = document.getElementById('inp-name').value.trim();
  
  if (!code || code.length !== 6) { showErr('Enter 6-digit PIN'); return; }
  if (!name) { showErr('Enter your name'); return; }
  
  var btn = document.getElementById('btn-join');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Joining...';
  
  post('joinLive', {roomCode: code, name: name}, function(e, r) {
    btn.disabled = false;
    btn.innerHTML = 'Enter';
    
    if (e || !r || r.status !== 'success') {
      var msg = (r && r.message) || 'Connection failed';
      if (msg.includes('not found')) msg = 'Game not found. Check PIN.';
      else if (msg.includes('started')) msg = 'Game already started!';
      else if (msg.includes('name')) msg = 'Name taken, try another.';
      showErr(msg);
      return;
    }
    
    state.playerId = r.data.playerId;
    state.name = r.data.name;
    state.roomCode = r.data.roomCode;
    state.totalQ = r.data.totalQ || 0;
    
    // Sync clock
    syncClock(function() {
      document.getElementById('lobby-name').textContent = state.name;
      document.getElementById('lobby-room').textContent = state.roomCode;
      document.getElementById('lobby-av').textContent = ['🦊','🐼','🦁','🐨','🐯','🐷'][state.name.length % 6];
      show('s-lobby');
      startPolling();
    });
  });
}

function showErr(msg) {
  var el = document.getElementById('join-err');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(function() { el.classList.remove('on'); }, 4000);
}

function syncClock(cb) {
  var start = Date.now();
  post('syncTime', {}, function(e, r) {
    if (!e && r && r.status === 'success') {
      var end = Date.now();
      var rtt = end - start;
      state.serverOffset = (r.data.serverTime + rtt/2) - end;
    }
    if (cb) cb();
  });
}

function getServerTime() {
  return Date.now() + state.serverOffset;
}

// POLLING - Adaptive rate
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  doPoll(); // Immediate first poll
  pollTimer = setInterval(doPoll, 1500); // Poll every 1.5s (not too fast)
}

function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

function doPoll() {
  if (!state.playerId || !state.roomCode) return;
  
  // Don't poll if already polling (prevent overlap)
  var now = Date.now();
  if (now - lastPollTime < 1000) return;
  lastPollTime = now;
  
  post('getLiveState', {
    roomCode: state.roomCode,
    playerId: state.playerId
  }, function(e, r) {
    if (e) {
      // Silent retry - overlay already shown by post()
      return;
    }
    if (!r || r.status !== 'success') return;
    
    applyState(r.data);
  });
}

// STATE MACHINE
function applyState(d) {
  // Debounce - ignore if same state
  var stateKey = d.phase + '-' + d.currentQ + '-' + d.myScore;
  if (stateKey === state.lastState) return;
  state.lastState = stateKey;
  
  state.score = d.myScore || 0;
  state.correct = d.myCorrect || 0;
  state.streak = d.myStreak || 0;
  
  // Phase handling
  switch(d.phase) {
    case 'lobby':
      if (!isScreen('s-lobby')) show('s-lobby');
      document.getElementById('lobby-count').textContent = d.playerCount || 1;
      break;
      
    case 'question':
      if (d.currentQ !== state.currentQ || !isScreen('s-question')) {
        state.currentQ = d.currentQ;
        state.answered = false;
        showQuestion(d);
      }
      updateTimer(d);
      break;
      
    case 'feedback':
      if (!isScreen('s-feedback')) showFeedback(d);
      break;
      
    case 'leaderboard':
      if (!isScreen('s-leaderboard')) showLeaderboard(d);
      updateNextTimer(d);
      break;
      
    case 'ended':
      stopPolling();
      if (!isScreen('s-ended')) showEnded(d);
      break;
  }
}

function isScreen(id) {
  return document.getElementById(id).classList.contains('on');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
}

// QUESTION SCREEN
function showQuestion(d) {
  show('s-question');
  
  var q = d.currentQuestion;
  if (!q) return;
  
  document.getElementById('q-num').textContent = 'Q' + (d.currentQ + 1);
  document.getElementById('q-score').textContent = state.score.toLocaleString();
  document.getElementById('q-type').textContent = q.type === 'TF' ? 'TRUE OR FALSE' : q.type === 'SHORT' ? 'TYPE ANSWER' : 'MULTIPLE CHOICE';
  document.getElementById('q-text').textContent = q.text;
  
  var box = document.getElementById('answers-box');
  box.innerHTML = '';
  
  if (q.type === 'TF') {
    box.className = 'tf';
    box.innerHTML = '<button class="tf-btn t" onclick="answer(\'A\',this)">✓ TRUE</button>' +
                    '<button class="tf-btn f" onclick="answer(\'B\',this)">✗ FALSE</button>';
  } else if (q.type === 'SHORT') {
    box.className = 'short';
    box.innerHTML = '<input type="text" id="short-inp" placeholder="Type answer..." maxlength="100">' +
                    '<button onclick="submitShort()">SUBMIT</button>';
    setTimeout(function() { document.getElementById('short-inp').focus(); }, 100);
  } else {
    box.className = 'answers';
    var colors = ['red','blue','yellow','green'];
    var shapes = ['▲','◆','●','■'];
    var opts = q.options || [];
    for (var i = 0; i < Math.min(opts.length, 4); i++) {
      var btn = document.createElement('button');
      btn.className = 'ans-btn ' + colors[i];
      btn.innerHTML = '<span class="ans-shape">' + shapes[i] + '</span><span>' + escapeHtml(opts[i]) + '</span><span class="ans-letter">' + String.fromCharCode(65+i) + '</span>';
      btn.onclick = (function(l) { return function() { answer(l, this); }; })(String.fromCharCode(65+i));
      box.appendChild(btn);
    }
  }
  
  // Start timer sync
  state.questionStart = new Date(d.questionStartsAt).getTime();
  state.questionEnd = new Date(d.questionEndsAt).getTime();
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(function() { updateTimer(d); }, 100);
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateTimer(d) {
  var now = getServerTime();
  var remaining = Math.max(0, state.questionEnd - now);
  var total = state.questionEnd - state.questionStart;
  var pct = remaining / total;
  
  document.getElementById('q-timer').textContent = Math.ceil(remaining / 1000);
  
  var ring = document.getElementById('timer-ring');
  var offset = 169.65 * (1 - pct);
  ring.style.strokeDashoffset = offset;
  
  if (pct <= 0.25) ring.style.stroke = 'var(--red)';
  else if (pct <= 0.5) ring.style.stroke = 'var(--yellow)';
  else ring.style.stroke = 'var(--green)';
  
  if (remaining <= 0 && !state.answered) {
    state.answered = true;
    showTimeout();
  }
}

function answer(ans, btn) {
  if (state.answered) return;
  state.answered = true;
  
  btn.classList.add('sel');
  document.querySelectorAll('.ans-btn, .tf-btn').forEach(function(b) {
    if (b !== btn) b.disabled = true;
  });
  
  // Show locked overlay
  var lock = document.createElement('div');
  lock.className = 'locked';
  lock.textContent = '✓';
  btn.appendChild(lock);
  
  post('submitLiveAnswer', {
    roomCode: state.roomCode,
    playerId: state.playerId,
    questionId: state.currentQ,
    answer: ans
  }, function() {});
}

function submitShort() {
  var inp = document.getElementById('short-inp');
  var val = inp.value.trim();
  if (!val) {
    inp.style.borderColor = 'var(--red)';
    setTimeout(function() { inp.style.borderColor = ''; }, 500);
    return;
  }
  inp.disabled = true;
  answer(val, {classList: {add: function(){}}, appendChild: function(){}});
}

function showTimeout() {
  document.getElementById('answers-box').innerHTML = 
    '<div style="text-align:center;padding:40px;"><div style="font-size:64px;margin-bottom:16px;">⏰</div><div style="font-size:24px;color:var(--yellow);">Time\'s up!</div></div>';
}

// FEEDBACK
function showFeedback(d) {
  if (syncTimer) clearInterval(syncTimer);
  show('s-feedback');
  
  var icon = document.getElementById('fb-icon');
  var title = document.getElementById('fb-title');
  var points = document.getElementById('fb-points');
  
  if (d.myLastCorrect) {
    icon.className = 'fb-icon ok';
    icon.textContent = '✓';
    title.textContent = 'Correct!';
    title.style.color = 'var(--green)';
  } else if (d.myLastAnswer === 'TIMEOUT') {
    icon.className = 'fb-icon time';
    icon.textContent = '⏰';
    title.textContent = 'Time\'s up!';
    title.style.color = 'var(--yellow)';
  } else {
    icon.className = 'fb-icon bad';
    icon.textContent = '✗';
    title.textContent = 'Wrong';
    title.style.color = 'var(--red)';
  }
  
  points.textContent = (d.myLastPoints > 0 ? '+' : '') + (d.myLastPoints || 0);
}

// LEADERBOARD
function showLeaderboard(d) {
  if (syncTimer) clearInterval(syncTimer);
  show('s-leaderboard');
  
  var lb = d.leaderboard || [];
  
  // Podium (top 3)
  var pod = document.getElementById('podium');
  pod.innerHTML = '';
  var order = [1, 0, 2]; // 2nd, 1st, 3rd visually
  order.forEach(function(idx) {
    var p = lb[idx];
    if (!p) return;
    var div = document.createElement('div');
    div.className = 'pod-place';
    div.innerHTML = '<div class="pod-av">' + (idx === 0 ? '🥈' : idx === 1 ? '🥇' : '🥉') + '</div>' +
                    '<div class="pod-name">' + escapeHtml(p.name) + '</div>' +
                    '<div class="pod-score">' + p.score.toLocaleString() + '</div>' +
                    '<div class="pod-block">' + (idx + 1) + '</div>';
    pod.appendChild(div);
  });
  
  // List
  var list = document.getElementById('lb-list');
  list.innerHTML = '';
  lb.forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'lb-row' + (p.name === state.name ? ' me' : '');
    row.innerHTML = '<div class="lb-rank">' + (i + 1) + '</div>' +
                    '<div class="lb-av">' + (i < 3 ? ['🥈','🥇','🥉'][i] : '👤') + '</div>' +
                    '<div class="lb-name">' + escapeHtml(p.name) + (p.name === state.name ? '<span>YOU</span>' : '') + '</div>' +
                    '<div class="lb-score">' + p.score.toLocaleString() + '</div>';
    list.appendChild(row);
  });
}

function updateNextTimer(d) {
  if (!d.nextQuestionAt) {
    document.getElementById('next-timer').style.display = 'none';
    return;
  }
  document.getElementById('next-timer').style.display = 'block';
  
  if (countdownTimer) clearInterval(countdownTimer);
  
  function update() {
    var remaining = Math.ceil((new Date(d.nextQuestionAt).getTime() - getServerTime()) / 1000);
    document.getElementById('next-count').textContent = Math.max(0, remaining);
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      doPoll();
    }
  }
  
  update();
  countdownTimer = setInterval(update, 500);
}

// ENDED
function showEnded(d) {
  show('s-ended');
  
  var me = null;
  for (var i = 0; i < d.leaderboard.length; i++) {
    if (d.leaderboard[i].name === state.name) { me = d.leaderboard[i]; break; }
  }
  var rank = me ? me.rank : d.leaderboard.length;
  
  document.getElementById('end-trophy').textContent = rank === 1 ? '🏆' : rank <= 3 ? '🥇' : '🎉';
  document.getElementById('end-title').textContent = rank === 1 ? 'Champion!' : 'Game Over!';
  document.getElementById('end-rank').textContent = 'You finished #' + rank + ' of ' + d.leaderboard.length;
  document.getElementById('end-score').textContent = state.score.toLocaleString();
}

// Cleanup
window.onbeforeunload = function() {
  stopPolling();
  if (syncTimer) clearInterval(syncTimer);
  if (countdownTimer) clearInterval(countdownTimer);
};
</script>
</body>
</html>
